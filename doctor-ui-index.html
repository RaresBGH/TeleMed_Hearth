<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cabinet Medical Dr. Bogheanu — Consultație Video</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f9f9f9;
    color: #1a1c1c;
    min-height: 100dvh;
  }

  /* ── JOIN SCREEN ───────────────────────────────────────────── */
  #joinScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 40px rgba(26,28,28,0.08);
  }

  .card-title {
    font-size: 24px;
    font-weight: 700;
    color: #1a1c1c;
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-size: 16px;
    color: #40484e;
    margin-bottom: 28px;
  }

  .field-label {
    font-size: 14px;
    color: #40484e;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }

  #appointmentInput {
    width: 100%;
    height: 56px;
    font-size: 18px;
    border: 2px solid #5BA4CF;
    border-radius: 8px;
    padding: 0 16px;
    outline: none;
    background: #f9f9f9;
    color: #1a1c1c;
    transition: border-color 0.15s;
  }
  #appointmentInput:focus { border-color: #3a82aa; background: #fff; }

  #joinBtn {
    width: 100%;
    height: 64px;
    margin-top: 16px;
    background: #5BA4CF;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  #joinBtn:hover  { background: #3a82aa; }
  #joinBtn:active { transform: scale(0.98); }

  #statusText {
    margin-top: 16px;
    font-size: 16px;
    color: #40484e;
    min-height: 24px;
    text-align: center;
  }

  /* ── CALL SCREEN ───────────────────────────────────────────── */
  #callScreen {
    display: none;
    position: relative;
    width: 100%;
    min-height: 100dvh;
    background: #000;
  }

  #remoteVideo {
    width: 100%;
    max-height: calc(100dvh - 120px);
    background: #111;
    border-radius: 0;
    display: block;
    object-fit: cover;
  }

  #localVideo {
    position: fixed;
    bottom: 128px;
    right: 16px;
    width: 160px;
    height: 120px;
    background: #222;
    border-radius: 8px;
    object-fit: cover;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  /* ── CONTROL BAR ───────────────────────────────────────────── */
  #controlBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 112px;
    background: rgba(249,249,249,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 20;
  }

  .ctrl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    background: none;
    border: none;
  }

  .ctrl-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    transition: background 0.15s, transform 0.1s;
  }
  .ctrl-circle:active { transform: scale(0.92); }

  .ctrl-label {
    font-size: 13px;
    color: #40484e;
    font-weight: 500;
  }

  #muteBtn   .ctrl-circle { background: #f3f3f3; }
  #cameraBtn .ctrl-circle { background: #f3f3f3; }
  #endBtn    .ctrl-circle { background: #ab1118; color: #fff; }
  #endBtn    .ctrl-label  { color: #ab1118; font-weight: 700; }

  /* ── CALL STATUS OVERLAY ────────────────────────────────────── */
  #callStatus {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,28,28,0.7);
    color: #fff;
    font-size: 15px;
    padding: 8px 20px;
    border-radius: 999px;
    z-index: 30;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<!-- ── STATE A: JOIN ─────────────────────────────────────────── -->
<div id="joinScreen">
  <div class="card">
    <p class="card-title">Cabinet Medical Dr. Bogheanu</p>
    <p class="card-subtitle">Interfață medic — consultație video</p>

    <!-- Today's appointments list (loaded from Medplum on page load) -->
    <div id="appointmentsList">
      <p id="apptLoadingMsg" style="color:#40484e;font-size:15px;margin-bottom:16px;">
        Se încarcă programările de astăzi...
      </p>
    </div>

    <!-- Fallback: manual entry -->
    <details style="margin-top:24px;">
      <summary style="cursor:pointer;font-size:14px;color:#40484e;font-weight:600;margin-bottom:12px;">
        Sau introduceți codul programării manual
      </summary>
      <div style="margin-top:12px;">
        <label class="field-label" for="appointmentInput">Cod programare</label>
        <input id="appointmentInput" type="text"
               placeholder="ex: appt-12345" autocomplete="off" />
        <button id="joinBtn" style="margin-top:12px;">Intră în consultație</button>
      </div>
    </details>
    <p id="statusText"></p>
  </div>
</div>

<!-- ── STATE B: ACTIVE CALL ──────────────────────────────────── -->
<div id="callScreen">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo"  autoplay playsinline muted></video>
  <div id="callStatus">Așteptare pacient...</div>
  <div id="controlBar">
    <button class="ctrl-btn" id="muteBtn">
      <div class="ctrl-circle">🎤</div>
      <span class="ctrl-label">Fără sunet</span>
    </button>
    <button class="ctrl-btn" id="endBtn">
      <div class="ctrl-circle">■</div>
      <span class="ctrl-label">Închide</span>
    </button>
    <button class="ctrl-btn" id="cameraBtn">
      <div class="ctrl-circle">📷</div>
      <span class="ctrl-label">Oprește video</span>
    </button>
  </div>
</div>

<script>
  const SIGNALING_URL  = 'wss://telemed-signal.duckdns.org';
  const MEDPLUM_BASE   = 'https://telemed-medplum.duckdns.org';
  const TOKEN_URL      = MEDPLUM_BASE + '/oauth2/token';
  const CLIENT_ID      = 'c18b54d9-f511-46db-903e-882b47dc3c63';
  const CLIENT_SECRET  = '7f86f3b5c08e94d711f61a4565c7d577cb303e78a5d57b5d340b74baf8c0b283';
  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    {
      urls:       'turn:34.185.191.34:3478',
      username:   'telemed',
      credential: 'TeleMed_TURN_2026!',
    },
  ];

  let pc              = null;
  let localStream     = null;
  let signalingSocket = null;
  let currentRoom     = null;
  let isMuted         = false;
  let isCameraOff     = false;
  let medplumToken    = null;

  // ── Medplum auth + appointment loading ──────────────────────────────────────

  async function fetchMedplumToken() {
    try {
      const res = await fetch(TOKEN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `grant_type=client_credentials&client_id=${CLIENT_ID}&client_secret=${encodeURIComponent(CLIENT_SECRET)}`,
      });
      if (!res.ok) throw new Error('Token fetch failed: ' + res.status);
      const data = await res.json();
      return data.access_token;
    } catch (e) {
      console.error('Medplum token error:', e);
      return null;
    }
  }

  async function loadTodayAppointments() {
    const listEl = document.getElementById('appointmentsList');
    const loadingEl = document.getElementById('apptLoadingMsg');

    medplumToken = await fetchMedplumToken();
    if (!medplumToken) {
      loadingEl.textContent = 'Nu s-au putut încărca programările (eroare autentificare).';
      return;
    }

    try {
      const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
      const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
      const url   = `${MEDPLUM_BASE}/fhir/R4/Appointment?date=ge${today}T00:00:00Z&date=lt${tomorrow}T00:00:00Z&status=booked&_include=Appointment:patient&_count=50`;
      const res   = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + medplumToken,
          'Accept': 'application/fhir+json',
        },
      });
      if (!res.ok) throw new Error('Appointment fetch failed: ' + res.status);
      const bundle = await res.json();

      // Extract Patient resources for name lookup
      const patients = {};
      (bundle.entry || []).forEach(e => {
        if (e.resource?.resourceType === 'Patient') {
          const name = e.resource.name?.[0];
          const display = name
            ? ((name.given || []).join(' ') + ' ' + (name.family || '')).trim()
            : 'Pacient necunoscut';
          patients[e.resource.id] = display;
        }
      });

      const appointments = (bundle.entry || [])
        .map(e => e.resource)
        .filter(r => r?.resourceType === 'Appointment');

      loadingEl.remove();

      if (appointments.length === 0) {
        listEl.innerHTML = '<p style="color:#40484e;font-size:15px;margin-bottom:16px;">Nicio programare pentru astăzi.</p>';
        return;
      }

      listEl.innerHTML = '<p style="font-size:13px;font-weight:600;color:#40484e;margin-bottom:12px;letter-spacing:0.05em;">PROGRAMĂRI AZI</p>';

      appointments.forEach(appt => {
        const apptId   = appt.id || '';
        const start    = appt.start ? new Date(appt.start) : null;
        const timeStr  = start ? start.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' }) : '--:--';
        const patRef   = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
        const patId    = patRef?.actor?.reference?.replace('Patient/', '') || '';
        const patName  = patients[patId] || 'Pacient';

        const card = document.createElement('div');
        card.style.cssText = 'background:#f3f3f3;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;';
        card.innerHTML = `
          <div>
            <div style="font-weight:700;font-size:16px;color:#1a1c1c;">${patName}</div>
            <div style="font-size:14px;color:#40484e;margin-top:2px;">🕐 ${timeStr}</div>
          </div>
          <button onclick="joinWithId('${apptId}')"
            style="background:#5BA4CF;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;">
            Intră în consultație
          </button>`;
        listEl.appendChild(card);
      });
    } catch (e) {
      console.error('Appointment load error:', e);
      loadingEl.textContent = 'Eroare la încărcarea programărilor. Folosiți codul manual.';
    }
  }

  function joinWithId(appointmentId) {
    document.getElementById('appointmentInput').value = appointmentId;
    joinCall();
  }

  // Load appointments when page opens
  document.addEventListener('DOMContentLoaded', () => {
    loadTodayAppointments();
  });

  async function joinCall() {
    const appointmentId = document.getElementById('appointmentInput').value.trim();
    if (!appointmentId) {
      setJoinStatus('Introduceți codul programării.');
      return;
    }
    currentRoom = appointmentId;
    setJoinStatus('Se conectează...');
    document.getElementById('joinBtn').disabled = true;

    try {
      // Acquire local camera + mic
      localStream = await navigator.mediaDevices.getUserMedia(
        { video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;

      // Create PeerConnection
      pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // Remote stream → remoteVideo element
      pc.ontrack = (event) => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
        setCallStatus('În consultație');
      };

      // ICE candidates → signaling relay
      pc.onicecandidate = (event) => {
        if (!event.candidate) return;
        safeSend({
          type:         'candidate',
          room:         currentRoom,
          candidate:    event.candidate.candidate,
          sdpMid:       event.candidate.sdpMid,
          sdpMLineIndex: event.candidate.sdpMLineIndex,
        });
      };

      // Connect to signaling server
      signalingSocket = new WebSocket(SIGNALING_URL);

      signalingSocket.onopen = () => {
        safeSend({ type: 'join', room: currentRoom });
        setJoinStatus('');
        showCallUI();
        setCallStatus('Așteptare pacient...');
      };

      signalingSocket.onmessage = async (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'offer') {
          setCallStatus('Pacient conectat — se stabilește apelul...');
          await pc.setRemoteDescription(
            new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          safeSend({ type: 'answer', room: currentRoom, sdp: answer.sdp });
        }

        if (msg.type === 'candidate') {
          try {
            await pc.addIceCandidate(new RTCIceCandidate({
              candidate:    msg.candidate,
              sdpMid:       msg.sdpMid,
              sdpMLineIndex: msg.sdpMLineIndex,
            }));
          } catch(e) { console.warn('ICE candidate error:', e); }
        }
      };

      signalingSocket.onerror = () => {
        setCallStatus('Eroare conexiune server de semnalizare.');
      };

      signalingSocket.onclose = () => {
        setCallStatus('Conexiune semnalizare închisă.');
      };

    } catch (e) {
      setJoinStatus('Eroare: ' + e.message);
      document.getElementById('joinBtn').disabled = false;
      console.error(e);
    }
  }

  function endCall() {
    safeSend({ type: 'leave', room: currentRoom });
    signalingSocket?.close();
    pc?.close();
    localStream?.getTracks().forEach(t => t.stop());
    location.reload();
  }

  function toggleMute() {
    const track = localStream?.getAudioTracks()[0];
    if (!track) return;
    isMuted = !isMuted;
    track.enabled = !isMuted;
    document.querySelector('#muteBtn .ctrl-circle').textContent =
      isMuted ? '🔇' : '🎤';
    document.querySelector('#muteBtn .ctrl-circle').style.background =
      isMuted ? '#5BA4CF' : '#f3f3f3';
  }

  function toggleCamera() {
    const track = localStream?.getVideoTracks()[0];
    if (!track) return;
    isCameraOff = !isCameraOff;
    track.enabled = !isCameraOff;
    document.querySelector('#cameraBtn .ctrl-circle').textContent =
      isCameraOff ? '🚫' : '📷';
    document.querySelector('#cameraBtn .ctrl-circle').style.background =
      isCameraOff ? '#5BA4CF' : '#f3f3f3';
  }

  function safeSend(obj) {
    if (signalingSocket && signalingSocket.readyState === WebSocket.OPEN) {
      signalingSocket.send(JSON.stringify(obj));
    }
  }

  function setJoinStatus(msg) {
    document.getElementById('statusText').textContent = msg;
  }

  function setCallStatus(msg) {
    document.getElementById('callStatus').textContent = msg;
  }

  function showCallUI() {
    document.getElementById('joinScreen').style.display = 'none';
    document.getElementById('callScreen').style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('joinBtn')
      .addEventListener('click', joinCall);
    document.getElementById('endBtn')
      .addEventListener('click', endCall);
    document.getElementById('muteBtn')
      .addEventListener('click', toggleMute);
    document.getElementById('cameraBtn')
      .addEventListener('click', toggleCamera);
    document.getElementById('appointmentInput')
      .addEventListener('keydown', (e) => { if (e.key === 'Enter') joinCall(); });
  });
</script>
</body>
</html>
