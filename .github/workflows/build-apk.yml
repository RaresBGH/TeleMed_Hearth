#
# TeleMed Hearth — CI: Build release APK
# Runs on every push to main. ubuntu-latest is x86_64, required for AAPT2.

name: Build Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Set up Flutter 3.32.x (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=MEDPLUM_CLIENT_ID=${{ secrets.MEDPLUM_CLIENT_ID }} \
            --dart-define=MEDPLUM_CLIENT_SECRET=${{ secrets.MEDPLUM_CLIENT_SECRET }} \
            --dart-define=TURN_CREDENTIAL=${{ secrets.TURN_CREDENTIAL }} \
            --dart-define=TURN_USERNAME=${{ secrets.TURN_USERNAME }}
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: telemed-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
