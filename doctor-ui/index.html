<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeleMed Hearth — Doctor Interface</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f9f9f9;
    color: #1a1c1c;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── SIDE PANEL ───────────────────────────────────────────── */
  #sidePanel {
    position: fixed;
    top: 0; right: 0;
    width: 360px; height: 100dvh;
    background: #fff;
    border-left: 1px solid #e0e0e0;
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    z-index: 200;
  }
  #sidePanel.open { transform: translateX(0); }
  @media (max-width: 1023px) { #sidePanel { width: 300px; } }
  @media (max-width: 767px)  { #sidePanel { width: 100%; } }

  #panelHeader {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #e8e8e8;
    background: #f9f9f9; flex-shrink: 0;
  }
  #panelTitle { font-size: 15px; font-weight: 700; color: #1a1c1c; flex: 1; }
  #backToListBtn { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 700; color: #5BA4CF; padding: 4px 8px 4px 0; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  #backToListBtn:hover { color: #3a82aa; }
  #panelCloseBtn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: #40484e; padding: 4px; line-height: 1;
  }
  #panelCloseBtn:hover { color: #1a1c1c; }

  #panelContent {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .panel-state {
    display: none; flex: 1;
    flex-direction: column; overflow: hidden;
  }
  .panel-state.active { display: flex; }

  /* ── CHAT STRIPE (outside call only) ────────────────────── */
  #chatStripeBtn {
    position: fixed;
    top: 50%; right: 0;
    transform: translateY(-50%);
    background: #5BA4CF; color: #fff;
    border: none; border-radius: 8px 0 0 8px;
    width: 36px; height: 80px;
    cursor: pointer; z-index: 201;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    /* Use transform (not right) for the open/close animation so the visual
       position and Safari's hit-test rectangle stay in sync. */
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.15s;
    box-shadow: -2px 0 8px rgba(0,0,0,0.15);
    font-size: 11px; font-weight: 700;
    writing-mode: vertical-rl; text-orientation: mixed;
    letter-spacing: 0.08em;
    touch-action: manipulation;
  }
  #chatStripeBtn:hover { background: #3a82aa; }
  /* panel-open shifts the stripe left by the panel width using translateX
     so both axes are in the same transform — no right-property animation. */
  #chatStripeBtn.panel-open { transform: translateX(-360px) translateY(-50%); }
  #chatStripeBtn.hidden { display: none; }
  @media (max-width: 1023px) { #chatStripeBtn.panel-open { transform: translateX(-300px) translateY(-50%); } }
  @media (max-width: 767px)  { #chatStripeBtn.panel-open { transform: translateX(-100vw) translateY(-50%); } }

  /* ── MAIN CONTENT ────────────────────────────────────────── */
  #mainContent {
    width: 100%; min-height: 100dvh;
    transition: padding-right 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  @media (min-width: 1024px) {
    #mainContent.panel-open { padding-right: 360px; }
  }

  /* ── JOIN SCREEN ─────────────────────────────────────────── */
  #joinScreen {
    display: flex; align-items: flex-start;
    justify-content: center;
    min-height: 100dvh; padding: 32px 24px;
  }
  .card {
    background: #fff; border-radius: 12px;
    padding: 32px 28px; width: 100%; max-width: 540px;
    box-shadow: 0 4px 40px rgba(26,28,28,0.08);
  }
  .card-title { font-size: 22px; font-weight: 700; color: #1a1c1c; margin-bottom: 4px; }
  .card-subtitle { font-size: 15px; color: #40484e; margin-bottom: 24px; }
  .field-label { font-size: 13px; color: #40484e; font-weight: 600; margin-bottom: 8px; display: block; }
  select {
    width: 100%; height: 48px; font-size: 15px;
    border: 2px solid #5BA4CF; border-radius: 8px;
    padding: 0 12px; background: #f9f9f9; color: #1a1c1c;
    outline: none; cursor: pointer; margin-bottom: 16px;
  }
  select:focus { border-color: #3a82aa; background: #fff; }
  #todayDate { font-size: 13px; font-weight: 600; color: #5BA4CF; margin-bottom: 20px; letter-spacing: 0.02em; }
  .section-label { font-size: 12px; font-weight: 700; color: #40484e; letter-spacing: 0.06em; margin-bottom: 10px; }
  .appt-card {
    background: #f3f3f3; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .appt-patient { font-weight: 700; font-size: 15px; color: #1a1c1c; }
  .appt-time { font-size: 13px; color: #40484e; margin-top: 2px; }
  .appt-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .join-btn {
    background: #5BA4CF; color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .join-btn:hover:not(:disabled) { background: #3a82aa; }
  .join-btn:disabled { background: #c4c4c4; color: #888; cursor: not-allowed; }
  .view-report-btn {
    background: none; border: 1.5px solid #5BA4CF; color: #5BA4CF;
    border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .view-report-btn:hover { background: #eaf2f9; }
  .empty-state { font-size: 14px; color: #40484e; padding: 16px 0; text-align: center; }
  details { margin-top: 24px; border-top: 1px solid #e8e8e8; padding-top: 16px; }
  summary { cursor: pointer; font-size: 13px; color: #40484e; font-weight: 600; margin-bottom: 12px; }
  #appointmentInput {
    width: 100%; height: 48px; font-size: 15px;
    border: 2px solid #5BA4CF; border-radius: 8px;
    padding: 0 12px; outline: none; background: #f9f9f9; color: #1a1c1c; margin-bottom: 10px;
  }
  #appointmentInput:focus { border-color: #3a82aa; background: #fff; }
  #joinBtn { width: 100%; height: 52px; background: #5BA4CF; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  #joinBtn:hover { background: #3a82aa; }
  #statusText { margin-top: 12px; font-size: 14px; color: #40484e; min-height: 20px; text-align: center; }

  /* ── CALL SCREEN ─────────────────────────────────────────── */
  #callScreen { display: none; position: relative; width: 100%; height: 100dvh; background: #000; overflow: hidden; }
  #remoteVideo { width: 100%; height: 100%; background-color: #000; display: block; object-fit: contain; aspect-ratio: 16/9; }
  #localVideo { position: fixed; bottom: 128px; left: 16px; width: 160px; height: 120px; background: #222; border-radius: 8px; object-fit: cover; z-index: 10; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  #callStatus { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(26,28,28,0.75); color: #fff; font-size: 14px; padding: 8px 20px; border-radius: 999px; z-index: 30; }
  #controlBar { position: fixed; bottom: 0; left: 0; right: 0; height: 112px; background: rgba(249,249,249,0.95); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; gap: 32px; z-index: 20; transition: right 0.28s cubic-bezier(0.4,0,0.2,1); }
  @media (min-width: 1024px) { body.panel-open #controlBar { right: 360px; } }
  .ctrl-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; background: none; border: none; }
  .ctrl-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: background 0.15s, transform 0.1s; }
  .ctrl-circle:active { transform: scale(0.92); }
  .ctrl-label { font-size: 12px; color: #40484e; font-weight: 500; }
  #muteBtn   .ctrl-circle { background: #f3f3f3; }
  #cameraBtn .ctrl-circle { background: #f3f3f3; }
  #endBtn    .ctrl-circle { background: #ab1118; color: #fff; }
  #endBtn    .ctrl-label  { color: #ab1118; font-weight: 700; }
  #panelBtn  .ctrl-circle { background: #f3f3f3; }

  /* ── PEER LEFT OVERLAY ───────────────────────────────────── */
  #peerLeftOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 50; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #fff; text-align: center; padding: 32px; }
  #peerLeftOverlay p { font-size: 20px; font-weight: 600; max-width: 320px; }
  #peerLeftEndBtn { margin-top: 16px; padding: 14px 32px; background: #ab1118; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }

  /* ── PANEL: PATIENT REPORT STATE ────────────────────────── */
  #stateReport { overflow-y: auto; }
  #reportTopBtn { padding: 10px 16px 0; }
  #reportTopBtn button { width: 100%; padding: 8px 12px; background: none; border: 1.5px solid #5BA4CF; color: #5BA4CF; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #reportTopBtn button:hover { background: #eaf2f9; }
  #reportInner { padding: 16px; }
  #reportPatientName { font-size: 18px; font-weight: 700; color: #1a1c1c; margin-bottom: 4px; }
  #reportPatientMeta { font-size: 13px; color: #40484e; margin-bottom: 12px; }
  .report-section-title { font-size: 11px; font-weight: 700; color: #40484e; letter-spacing: 0.06em; text-transform: uppercase; margin: 14px 0 8px; }
  .condition-chip { display: inline-block; background: #E8F4FC; color: #1a6495; border-radius: 16px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin: 0 4px 6px 0; }
  .observation-entry { background: #f3f3f3; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: #1a1c1c; line-height: 1.5; }
  .observation-entry.reviewed { opacity: 0.6; border-left: 3px solid #c4c4c4; padding-left: 10px; }
  .observation-date { font-size: 11px; color: #40484e; margin-top: 4px; }
  .btn-mark-reviewed { width: 100%; margin-top: 8px; padding: 8px; background: #f3f3f3; color: #1a1c1c; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-mark-reviewed:hover { background: #e0e0e0; }
  .btn-finalize { width: 100%; padding: 12px; margin-top: 16px; background: #5BA4CF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-finalize:hover:not(:disabled) { background: #3a82aa; }
  .btn-finalize:disabled { background: #c4c4c4; color: #888; cursor: not-allowed; }
  .obs-summary-label { font-size: 10px; color: #40484e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .btn-toggle-conv { width: 100%; margin-top: 6px; padding: 5px 0; background: none; border: none; color: #5BA4CF; font-size: 11px; font-weight: 700; cursor: pointer; text-align: left; }
  .btn-toggle-conv:hover { color: #3a82aa; }
  .conv-transcript { margin-top: 8px; display: none; border-top: 1px solid #e8e8e8; padding-top: 8px; max-height: 300px; overflow-y: auto; }
  .conv-transcript.expanded { display: block; }
  .conv-bubble-ai      { background: #f3f3f3; border-radius: 8px; padding: 5px 10px; margin: 3px 30px 3px 0; font-size: 12px; color: #1a1c1c; }
  .conv-bubble-patient { background: #E8F4FC; border-radius: 8px; padding: 5px 10px; margin: 3px 0 3px 30px; font-size: 12px; color: #1a1c1c; text-align: right; }
  .conv-bubble-doctor  { background: #E8F7EE; border-radius: 8px; padding: 5px 10px; margin: 3px 30px 3px 0; font-size: 12px; color: #1a6a3a; }

  /* ── PANEL: CHAT STATE (async Medplum) ───────────────────── */
  #stateChat { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #stateChat.active { display: flex; }
  #chatToReportBtn { padding: 10px 16px 0; flex-shrink: 0; }
  #chatToReportBtn button { width: 100%; padding: 8px 12px; background: none; border: 1.5px solid #5BA4CF; color: #5BA4CF; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #chatToReportBtn button:hover { background: #eaf2f9; }
  #asyncChatPatientHeader { padding: 8px 16px 4px; font-size: 13px; font-weight: 600; color: #40484e; flex-shrink: 0; border-bottom: 1px solid #f0f0f0; }
  #asyncChatMessages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .async-msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
  .async-msg.doctor { background: #E8F4FC; align-self: flex-end; color: #1a1c1c; }
  .async-msg.patient { background: #f3f3f3; align-self: flex-start; color: #1a1c1c; }
  .async-msg-label { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  .async-msg.doctor .async-msg-label { color: #5BA4CF; }
  .async-msg.patient .async-msg-label { color: #40484e; }
  #asyncChatInputRow { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e8e8e8; background: #f9f9f9; flex-shrink: 0; }
  #asyncChatInput { flex: 1; height: 40px; border: 1.5px solid #d0d0d0; border-radius: 8px; padding: 0 12px; font-size: 14px; outline: none; background: #fff; color: #1a1c1c; }
  #asyncChatInput:focus { border-color: #5BA4CF; }
  #asyncChatSendBtn { height: 40px; padding: 0 16px; background: #5BA4CF; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  #asyncChatSendBtn:hover { background: #3a82aa; }
  .chat-empty { font-size: 14px; color: #40484e; font-style: italic; padding: 16px; text-align: center; }
</style>
</head>
<body>

<!-- ── SIDE PANEL ─────────────────────────────────────────── -->
<div id="sidePanel">
  <div id="panelHeader">
    <button id="backToListBtn" style="display:none;" onclick="backToAppointmentList()">← Appts</button>
    <span id="panelTitle">Patient Report</span>
    <button id="panelCloseBtn" title="Close panel">✕</button>
  </div>
  <div id="panelContent">

    <!-- State 1: Patient Triage Report -->
    <div id="stateReport" class="panel-state">
      <div id="reportTopBtn"></div>
      <div id="reportInner">
        <div id="reportPatientName">Patient</div>
        <div id="reportPatientMeta"></div>
        <div id="reportConditions"></div>
        <div id="reportObservations"></div>
        <div id="reportActions"></div>
      </div>
    </div>

    <!-- State 2: Async Chat via Medplum Communications -->
    <div id="stateChat" class="panel-state">
      <div id="chatToReportBtn">
        <button onclick="showPanelState('report')">← Patient Report</button>
      </div>
      <div id="asyncChatPatientHeader">Select a patient to start chatting</div>
      <div id="asyncChatMessages"></div>
      <div id="asyncChatInputRow">
        <input id="asyncChatInput" type="text" placeholder="Type a message..." />
        <button id="asyncChatSendBtn">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- ── CHAT STRIPE (outside call — opens async chat) ─────── -->
<button id="chatStripeBtn" title="Open chat">Chat</button>

<!-- ── MAIN CONTENT ──────────────────────────────────────── -->
<div id="mainContent">

  <!-- JOIN SCREEN -->
  <div id="joinScreen">
    <div class="card">
      <p class="card-title">TeleMed Hearth — Doctor Interface</p>
      <p class="card-subtitle">Video consultation management</p>

      <label class="field-label" for="doctorSelect">Select doctor:</label>
      <select id="doctorSelect"></select>

      <p id="todayDate"></p>

      <div id="appointmentsList">
        <p class="empty-state">Loading today's appointments...</p>
      </div>

      <details>
        <summary>Or enter appointment code manually</summary>
        <div style="margin-top:12px;">
          <label class="field-label" for="appointmentInput">Appointment code</label>
          <input id="appointmentInput" type="text" placeholder="e.g. appt-12345" autocomplete="off" />
          <button id="joinBtn">Join</button>
        </div>
      </details>
      <p id="statusText"></p>
    </div>
  </div>

  <!-- CALL SCREEN -->
  <div id="callScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay playsinline muted></video>
    <div id="callStatus">Waiting for patient...</div>

    <div id="controlBar">
      <button class="ctrl-btn" id="muteBtn">
        <div class="ctrl-circle">🎤</div>
        <span class="ctrl-label">Mute</span>
      </button>
      <button class="ctrl-btn" id="endBtn">
        <div class="ctrl-circle">■</div>
        <span class="ctrl-label">End call</span>
      </button>
      <button class="ctrl-btn" id="cameraBtn">
        <div class="ctrl-circle">📷</div>
        <span class="ctrl-label">Stop video</span>
      </button>
      <button class="ctrl-btn" id="panelBtn">
        <div class="ctrl-circle">📋</div>
        <span class="ctrl-label">Report</span>
      </button>
    </div>
  </div>

</div>

<!-- ── PEER LEFT OVERLAY ───────────────────────────────── -->
<div id="peerLeftOverlay">
  <p>The patient has left the call.</p>
  <button id="peerLeftEndBtn">End Call</button>
</div>

<script>
  const SIGNALING_URL = 'wss://telemed-signal.duckdns.org';
  const MEDPLUM_BASE  = 'https://telemed-medplum.duckdns.org';
  // CREDENTIALS: populated at deploy time.
  // Never commit real values to this file.
  const CLIENT_ID     = ''; // injected at deploy time
  const CLIENT_SECRET = ''; // injected at deploy time
  const TURN_PASSWORD = ''; // injected at deploy time
  const TURN_USERNAME = ''; // injected at deploy time
  const ICE_SERVERS   = [
    { urls: 'stun:stun.l.google.com:19302' },
    // TODO: Replace hardcoded IP with a DNS name when GCP VM gets a stable hostname.
    { urls: 'turn:34.185.191.34:3478', username: TURN_USERNAME, credential: TURN_PASSWORD }
  ];
  const DOCTORS = [
    { name: 'Dr. Elena Ionescu',     specialty: 'Family Doctor',  id: '733e1972-b42d-4bd0-82c7-66db72b2d311' },
    { name: 'Dr. Andrei Popescu',    specialty: 'Pediatrics',     id: '474f526b-7919-48dd-9528-3c0eaff80cb6' },
    { name: 'Dr. Ioan Petrescu',     specialty: 'Cardiology',     id: '89b433f1-6c1d-41c3-bba8-f0e62011f86d' },
    { name: 'Dr. Mihai Dumitrescu',  specialty: 'Neurology',      id: '1eb50655-492c-4e65-9e9c-3c4c52592ca4' },
    { name: 'Dr. Cristina Florescu', specialty: 'Dermatology',    id: 'da372669-0950-4e0c-8e1a-cc24f667b3df' },
    { name: 'Dr. Radu Constantin',   specialty: 'Orthopedics',    id: '7cd1e41c-c484-4873-8d1d-22ec6af86e51' },
    { name: 'Dr. Anca Muresan',      specialty: 'Ophthalmology',  id: '45965f71-a4e1-43cc-a0f9-532fc84b9e24' },
    { name: 'Dr. Sorin Nistor',      specialty: 'Psychiatry',     id: '94fcc35d-7fcd-4773-ab0f-5f5974435762' },
    { name: 'Dr. Luminita Gheorghe', specialty: 'Gynecology',     id: 'c9e9b208-ace2-4b87-b8ea-0c366b194b80' },
  ];

  let pc              = null;
  let localStream     = null;
  let signalingSocket = null;
  let currentRoom     = null;
  let currentPatientId = '';
  let currentPatientName = '';
  let isMuted         = false;
  let isCameraOff     = false;
  let medplumToken    = null;
  let panelOpen       = false;
  let currentPanelState = 'report';
  let allAppointments   = [];
  let allPatients       = {};
  let reviewedInSession = new Set();
  let fetchedObservations = [];
  let isCallActive      = false;

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Panel ─────────────────────────────────────────────────────────────────────

  function updateBackBtn() {
    const btn = document.getElementById('backToListBtn');
    if (btn) btn.style.display = (!isCallActive && currentPatientId) ? '' : 'none';
  }

  function backToAppointmentList() {
    currentPatientId = '';
    currentPatientName = '';
    fetchedObservations = [];
    closePanel();
    document.getElementById('joinScreen').style.display = '';
    document.getElementById('callScreen').style.display = 'none';
    updateBackBtn();
  }

  function renderTranscript(noteText) {
    const container = document.createElement('div');
    container.className = 'conv-transcript';
    noteText.split('\n').forEach(line => {
      const t = line.trim();
      if (!t) return;
      let cls = '', text = '';
      if (t.startsWith('[AI]')) {
        cls  = 'conv-bubble-ai';
        text = t.replace(/^\[AI\]\s*\d+:\d+:\s*/, '').trim();
      } else if (t.startsWith('[Patient]') || t.startsWith('[Pacient]')) {
        cls  = 'conv-bubble-patient';
        text = t.replace(/^\[[^\]]+\]\s*\d+:\d+:\s*/, '').trim();
      } else if (t.startsWith('[Doctor]')) {
        cls  = 'conv-bubble-doctor';
        text = t.replace(/^\[Doctor\]\s*\d+:\d+:\s*/, '').trim();
      }
      if (!cls || !text) return;
      const b = document.createElement('div');
      b.className = cls;
      b.textContent = text;
      container.appendChild(b);
    });
    return container;
  }

  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('sidePanel').classList.toggle('open', panelOpen);
    document.getElementById('mainContent').classList.toggle('panel-open', panelOpen);
    document.body.classList.toggle('panel-open', panelOpen);
    document.getElementById('chatStripeBtn').classList.toggle('panel-open', panelOpen);
  }

  function openPanel() { if (!panelOpen) togglePanel(); }
  function closePanel() { if (panelOpen) togglePanel(); }

  function showPanelState(state) {
    currentPanelState = state;
    document.querySelectorAll('.panel-state').forEach(el => el.classList.remove('active'));
    const id = 'state' + state.charAt(0).toUpperCase() + state.slice(1);
    document.getElementById(id).classList.add('active');
    const titles = { report: 'Patient Report', chat: 'Chat' };
    document.getElementById('panelTitle').textContent = titles[state] || 'Panel';
    if (state === 'chat') loadChatMessages();
    openPanel();
  }

  function updateReportTopBtn() {
    const btn = document.getElementById('reportTopBtn');
    if (isCallActive) {
      btn.innerHTML = '';  // no top button during call
      document.getElementById('reportActions').style.display = 'none';
    } else {
      btn.innerHTML = '<button onclick="showPanelState(\'chat\')">💬 Chat</button>';
      const ra = document.getElementById('reportActions');
      if (ra) ra.style.display = '';
    }

  // ── Async Chat (Medplum Communications) ───────────────────────────────────────
  async function loadChatMessages() {
    const header = document.getElementById('asyncChatPatientHeader');
    const msgs   = document.getElementById('asyncChatMessages');
    if (!currentPatientId) {
      header.textContent = 'No patient selected';
      msgs.innerHTML = '<p class="chat-empty">Select a patient from the appointments list first.</p>';
      return;
    }
    header.textContent = currentPatientName || 'Patient';
    msgs.innerHTML = '<p style="font-size:12px;color:#40484e;padding:8px 0;font-style:italic;">Loading…</p>';
    try {
      const token = await ensureToken();
      if (!token) { msgs.innerHTML = '<p style="color:red;font-size:12px;">Auth error</p>'; return; }
      const patId = currentPatientId;
      const res = await fetch(
        MEDPLUM_BASE + '/fhir/R4/Communication?subject=Patient/' + patId + '&_sort=sent&_count=50',
        { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' } }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const bundle = await res.json();
      const entries = (bundle.entry || []).map(e => e.resource).filter(Boolean);
      msgs.innerHTML = '';
      if (entries.length === 0) {
        msgs.innerHTML = '<p style="font-size:13px;color:#40484e;font-style:italic;padding:12px 0;">No messages yet.</p>';
        return;
      }
      entries.forEach(comm => {
        const exts = comm.extension || [];
        const isPatient = exts.some(e => e.url === 'https://telemed-bogheanu.ro/fhir/ext/isPatient' && e.valueBoolean === true);
        const text = comm.payload?.[0]?.contentString || '';
        const sentStr = comm.sent || '';
        const timeLabel = sentStr ? new Date(sentStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '';
        const div = document.createElement('div');
        div.className = 'async-msg ' + (isPatient ? 'patient' : 'doctor');
        div.innerHTML =
          '<div class="async-msg-label">' + (isPatient ? 'Patient' : 'Doctor') + (timeLabel ? ' · ' + timeLabel : '') + '</div>' +
          '<div>' + esc(text) + '</div>';
        msgs.appendChild(div);
      });
      msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
      msgs.innerHTML = '<p style="color:red;font-size:12px;">Error loading messages: ' + esc(e.message) + '</p>';
    }
  }

  async function sendMedplumChatMessage() {
    const input = document.getElementById('asyncChatInput');
    const text  = input.value.trim();
    if (!currentPatientId) { alert('Please select a patient first.'); return; }
    if (!text) return;
    input.value = '';
    const currentDoctorId = document.getElementById('doctorSelect').value;
    try {
      const token = await ensureToken();
      if (!token) { alert('Not authenticated'); return; }
      const payload = {
        resourceType: 'Communication',
        status: 'completed',
        sent: new Date().toISOString(),
        subject: { reference: 'Patient/' + currentPatientId },
        sender: { reference: 'Practitioner/' + currentDoctorId },
        payload: [{ contentString: text }],
        extension: [{ url: 'https://telemed-bogheanu.ro/fhir/ext/isPatient', valueBoolean: false }],
      };
      const res = await fetch(MEDPLUM_BASE + '/fhir/R4/Communication', {
        method: 'POST',
        headers: { 'Content-Type': 'application/fhir+json', 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Append bubble locally
      const msgs = document.getElementById('asyncChatMessages');
      const div  = document.createElement('div');
      div.className = 'async-msg doctor';
      div.innerHTML = '<div class="async-msg-label">Doctor</div><div>' + esc(text) + '</div>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
      alert('Send failed: ' + e.message);
    }
  }

  // ── Medplum auth ─────────────────────────────────────────────────────────────
  async function fetchMedplumToken() {
    if (!CLIENT_ID || !CLIENT_SECRET) {
      const apptList = document.getElementById('appointmentsList');
      if (apptList) apptList.innerHTML = '<p style="color:#c0392b;padding:12px;">Doctor UI not configured. Contact admin.</p>';
      return null;
    }
    try {
      const res = await fetch(MEDPLUM_BASE + '/oauth2/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'grant_type=client_credentials&client_id=' + CLIENT_ID +
              '&client_secret=' + encodeURIComponent(CLIENT_SECRET),
      });
      if (!res.ok) throw new Error('Token fetch failed: ' + res.status);
      return (await res.json()).access_token;
    } catch(e) { console.error('Medplum token error:', e); return null; }
  }

  async function ensureToken() {
    if (!medplumToken) medplumToken = await fetchMedplumToken();
    return medplumToken;
  }

  // ── Doctor dropdown & date ────────────────────────────────────────────────────
  function populateDoctorDropdown() {
    const sel = document.getElementById('doctorSelect');
    sel.innerHTML = DOCTORS.map(d =>
      `<option value="${d.id}">${d.name} — ${d.specialty}</option>`
    ).join('');
    if (sel.value) loadAppointments();
  }

  function showTodayDate() {
    const formatted = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('todayDate').textContent = 'Appointments for: ' + formatted;
  }

  function isJoinable(startISO) {
    const start = new Date(startISO).getTime();
    const now   = Date.now();
    return now >= start - 60 * 60 * 1000 && now <= start + 2 * 60 * 60 * 1000;
  }

  // ── Appointments ─────────────────────────────────────────────────────────────
  async function loadAppointments() {
    const listEl  = document.getElementById('appointmentsList');
    const doctorId = document.getElementById('doctorSelect').value;
    listEl.innerHTML = '<p class="empty-state">Loading today\'s appointments...</p>';
    medplumToken = await fetchMedplumToken();
    if (!medplumToken) { listEl.innerHTML = '<p class="empty-state">Could not load appointments (auth error).</p>'; return; }
    try {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const localToday = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      const tomorrowDate = new Date(now);
      tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const localTomorrow = `${tomorrowDate.getFullYear()}-${pad(tomorrowDate.getMonth()+1)}-${pad(tomorrowDate.getDate())}`;
      const url = MEDPLUM_BASE + '/fhir/R4/Appointment' +
        '?date=ge' + localToday + 'T00:00:00Z' +
        '&date=lt' + localTomorrow + 'T00:00:00Z' +
        '&status=booked&_include=Appointment:actor&_count=50';
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + medplumToken, 'Accept': 'application/fhir+json' } });
      if (!res.ok) throw new Error('Appointment fetch failed: ' + res.status);
      const bundle = await res.json();
      allPatients = {};
      (bundle.entry || []).forEach(e => {
        if (e.resource?.resourceType === 'Patient') {
          const n = e.resource.name?.[0];
          allPatients[e.resource.id] = { name: n ? ((n.given || []).join(' ') + ' ' + (n.family || '')).trim() : 'Patient', resource: e.resource };
        }
      });
      allAppointments = (bundle.entry || [])
        .map(e => e.resource)
        .filter(r => { if (r?.resourceType !== 'Appointment') return false; return (r.participant || []).some(p => p.actor?.reference === 'Practitioner/' + doctorId); })
        .sort((a, b) => new Date(a.start) - new Date(b.start));
      renderAppointments(listEl);
    } catch(e) {
      console.error('Appointment load error:', e);
      listEl.innerHTML = '<p class="empty-state">Error loading appointments. Use manual code below.</p>';
    }
  }

  function renderAppointments(listEl) {
    listEl.innerHTML = '';
    if (allAppointments.length === 0) { listEl.innerHTML = '<p class="empty-state">No appointments for today.</p>'; return; }
    const header = document.createElement('p');
    header.className = 'section-label';
    header.textContent = 'TODAY\'S APPOINTMENTS';
    listEl.appendChild(header);
    allAppointments.forEach(appt => {
      const apptId  = appt.id || '';
      const start   = appt.start ? new Date(appt.start) : null;
      const timeStr = start ? start.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '--:--';
      const patRef  = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
      const patId   = patRef?.actor?.reference?.replace('Patient/', '') || '';
      const patName = (allPatients[patId] || {}).name || 'Patient';
      const joinable = start ? isJoinable(appt.start) : false;
      const card = document.createElement('div');
      card.className = 'appt-card';
      card.innerHTML =
        '<div style="flex:1;">' +
          '<div class="appt-patient">' + esc(patName) + '</div>' +
          '<div class="appt-time">&#128336; ' + timeStr + '</div>' +
        '</div>' +
        '<div class="appt-actions">' +
          '<button class="join-btn"' + (joinable ? '' : ' disabled') + '>Join consultation</button>' +
          '<button class="view-report-btn">View report</button>' +
        '</div>';
      card.querySelector('.join-btn').addEventListener('click', e => { e.stopPropagation(); joinWithId(apptId); });
      card.querySelector('.view-report-btn').addEventListener('click', e => {
        e.stopPropagation();
        currentPatientId = patId;
        currentPatientName = patName;
        viewPatientReport(patId, patName);
      });
      listEl.appendChild(card);
    });
  }

  // ── Patient report ────────────────────────────────────────────────────────────
  async function viewPatientReport(patientId, patientName) {
    reviewedInSession   = new Set();
    fetchedObservations = [];
    document.getElementById('reportPatientName').textContent = patientName;
    document.getElementById('reportPatientMeta').textContent = 'Loading clinical data...';
    document.getElementById('reportConditions').innerHTML   = '';
    document.getElementById('reportObservations').innerHTML = '';
    document.getElementById('reportActions').innerHTML      = '';
    showPanelState('report');
    updateReportTopBtn();
    updateBackBtn();
    const token = await ensureToken();
    if (!token) { document.getElementById('reportPatientMeta').textContent = 'Auth error — cannot load data.'; return; }
    try {
      const headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' };
      const [condRes, obsRes] = await Promise.all([
        fetch(MEDPLUM_BASE + '/fhir/R4/Condition?patient=' + patientId + '&_count=20', { headers }),
        fetch(MEDPLUM_BASE + '/fhir/R4/Observation?patient=' + patientId + '&_sort=-date&_count=10', { headers }),
      ]);
      const conditions   = condRes.ok ? (await condRes.json()).entry?.map(e => e.resource).filter(Boolean) || [] : [];
      const observations = obsRes.ok  ? (await obsRes.json()).entry?.map(e => e.resource).filter(Boolean) || []  : [];
      fetchedObservations = observations;
      const patInfo = allPatients[patientId];
      if (patInfo?.resource) {
        const dob = patInfo.resource.birthDate || '';
        const gender = patInfo.resource.gender || '';
        document.getElementById('reportPatientMeta').textContent = [gender, dob ? 'DOB: ' + dob : ''].filter(Boolean).join(' · ') || '';
      } else { document.getElementById('reportPatientMeta').textContent = ''; }
      const condEl = document.getElementById('reportConditions');
      if (conditions.length > 0) {
        condEl.innerHTML = '<div class="report-section-title">Active Conditions</div>';
        conditions.forEach(c => { const chip = document.createElement('span'); chip.className = 'condition-chip'; chip.textContent = c.code?.text || c.code?.coding?.[0]?.display || 'Unknown'; condEl.appendChild(chip); });
      }
      const obsEl = document.getElementById('reportObservations');
      obsEl.innerHTML = '<div class="report-section-title">Triage Observations</div>';
      if (observations.length > 0) {
        observations.forEach(obs => {
          const entry = document.createElement('div');
          const reviewed = obs.status === 'final';
          entry.className = 'observation-entry' + (reviewed ? ' reviewed' : '');
          const val      = obs.valueString || '';
          const noteText = obs.note?.[0]?.text || '';
          const date     = obs.effectiveDateTime ? new Date(obs.effectiveDateTime).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '';
          const obsExts  = obs.extension || [];
          const reviewedByTargetRef = obsExts.find(e => e.url && e.url.includes('reviewed-by-target'))?.valueString || null;
          const assignedDoctor = reviewedByTargetRef ? DOCTORS.find(d => reviewedByTargetRef.includes(d.id)) : null;
          const assignedLabel  = assignedDoctor ? assignedDoctor.name : (reviewedByTargetRef ? reviewedByTargetRef : null);
          const recordedByName = obsExts.find(e => e.url === 'https://telemed-bogheanu.ro/fhir/ext/doctor-name')?.valueString || null;
          // FIX 1: Extract last [AI] line from note as clinical summary; fall back to valueString.
          const aiLines = noteText.split('\n').filter(l => l.startsWith('[AI]'));
          const lastAi  = aiLines.length > 0
            ? aiLines[aiLines.length - 1].replace(/^\[AI\]\s*\d+:\d+:\s*/, '').trim()
            : '';
          const summary  = lastAi || val;
          const summaryDisplay = summary.substring(0, 200) + (summary.length > 200 ? '…' : '');
          entry.innerHTML =
            '<div class="obs-summary-label">Clinical Summary</div>' +
            '<div>' + esc(summaryDisplay) + '</div>' +
            '<div class="observation-date">' + esc(date) + (reviewed ? ' · Reviewed' : '') +
            (assignedLabel ? ' · Assigned to: ' + esc(assignedLabel) : '') + '</div>' +
            (recordedByName ? '<div class="observation-date" style="color:#5BA4CF;">Recorded by: ' + esc(recordedByName) + '</div>' : '');
          // FIX 3: Conversation transcript toggle.
          if (noteText) {
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'btn-toggle-conv';
            toggleBtn.textContent = 'Show conversation ▼';
            const transcript = renderTranscript(noteText);
            toggleBtn.addEventListener('click', () => {
              const expanded = transcript.classList.toggle('expanded');
              toggleBtn.textContent = expanded ? 'Hide conversation ▲' : 'Show conversation ▼';
            });
            entry.appendChild(toggleBtn);
            entry.appendChild(transcript);
          }
          if (!reviewed && !isCallActive) { const btn = document.createElement('button'); btn.className = 'btn-mark-reviewed'; btn.textContent = 'Mark as reviewed'; btn.addEventListener('click', () => markReviewed(obs.id, btn, entry)); entry.appendChild(btn); }
          obsEl.appendChild(entry);
        });
      } else { obsEl.innerHTML += '<p class="empty-state" style="text-align:left;">No observations recorded.</p>'; }
      if (!isCallActive) {
        const actEl = document.getElementById('reportActions');
        const finBtn = document.createElement('button');
        finBtn.id = 'finalizeBtn'; finBtn.className = 'btn-finalize'; finBtn.textContent = 'Finalize consultation report';
        finBtn.addEventListener('click', () => finalizeReport(finBtn));
        actEl.appendChild(finBtn);
        updateFinalizeButton();
      }
    } catch(e) { console.error('Report load error:', e); document.getElementById('reportPatientMeta').textContent = 'Error loading clinical data.'; }
  }

  async function markReviewed(obsId, btn, entryEl) {
    if (!currentPatientId) { alert('Please select a patient first.'); return; }
    if (!obsId) return;
    btn.disabled = true; btn.textContent = 'Marking...';
    const token = await ensureToken();
    if (!token) { btn.disabled = false; btn.textContent = 'Mark as reviewed'; return; }
    try {
      const getRes = await fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' } });
      if (!getRes.ok) throw new Error('GET failed: ' + getRes.status);
      const obs = await getRes.json();
      const currentDoctorId = document.getElementById('doctorSelect').value;
      const updatedExtensions = [...(obs.extension || []), { url: 'https://telemed-bogheanu.ro/fhir/ext/reviewed-by', valueString: 'Practitioner/' + currentDoctorId }];
      const patchRes = await fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json-patch+json', 'Accept': 'application/fhir+json' }, body: JSON.stringify([{ op: 'replace', path: '/extension', value: updatedExtensions }]) });
      if (patchRes.ok) { entryEl.classList.add('reviewed'); btn.textContent = 'Reviewed ✓'; btn.style.cssText = 'width:100%;margin-top:8px;padding:8px;background:#16A34A;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:default;'; btn.disabled = true; reviewedInSession.add(obsId); updateFinalizeButton(); }
      else { btn.disabled = false; btn.textContent = 'Mark as reviewed'; }
    } catch(e) { btn.disabled = false; btn.textContent = 'Mark as reviewed'; console.error('Mark reviewed error:', e); }
  }

  async function finalizeReport(btn) {
    if (!currentPatientId) { alert('Please select a patient first.'); return; }
    if (reviewedInSession.size === 0) return;
    btn.disabled = true; btn.textContent = 'Finalizing...';
    const token = await ensureToken();
    if (!token) { btn.disabled = false; btn.textContent = 'Finalize consultation report'; return; }
    try {
      await Promise.all([...reviewedInSession].map(obsId =>
        fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json-patch+json', 'Accept': 'application/fhir+json' }, body: JSON.stringify([{ op: 'replace', path: '/status', value: 'final' }]) })
        .then(r => { if (!r.ok) throw new Error('PATCH ' + obsId + ' failed: ' + r.status); })
      ));
      btn.textContent = 'Report finalized ✓'; btn.style.background = '#16A34A'; btn.disabled = true; reviewedInSession.clear();
    } catch(e) { btn.disabled = false; btn.textContent = 'Finalize consultation report'; console.error('Finalize error:', e); }
  }

  function updateFinalizeButton() {
    const finBtn = document.getElementById('finalizeBtn');
    if (!finBtn) return;
    finBtn.disabled = reviewedInSession.size === 0;
  }

  // ── PDF upload (Medplum only, no WebSocket) ───────────────────────────────────
  async function uploadAndSendPdf(file) {
    const filename = file.name;
    try {
      const token = await ensureToken();
      if (!token) throw new Error('Not authenticated');
      const base = MEDPLUM_BASE + '/fhir/R4';
      const arrayBuffer = await file.arrayBuffer();
      const binRes = await fetch(base + '/Binary', { method: 'POST', headers: { 'Content-Type': 'application/pdf', 'Authorization': 'Bearer ' + token }, body: arrayBuffer });
      if (!binRes.ok) throw new Error('Binary upload failed: ' + binRes.status);
      const binaryId = (await binRes.json()).id;
      if (!binaryId) throw new Error('No Binary ID returned');
      const docRefPayload = { resourceType: 'DocumentReference', status: 'current', content: [{ attachment: { contentType: 'application/pdf', url: 'Binary/' + binaryId, title: filename } }] };
      if (currentPatientId) docRefPayload.subject = { reference: 'Patient/' + currentPatientId };
      const drRes = await fetch(base + '/DocumentReference', { method: 'POST', headers: { 'Content-Type': 'application/fhir+json', 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' }, body: JSON.stringify(docRefPayload) });
      if (!drRes.ok) throw new Error('DocumentReference creation failed: ' + drRes.status);
      alert('📄 ' + filename + ' uploaded successfully.');
    } catch (e) { console.error('PDF upload error:', e); alert('Failed to upload PDF: ' + e.message); }
  }

  // ── WebRTC / signaling ────────────────────────────────────────────────────────
  function joinWithId(appointmentId) {
    document.getElementById('appointmentInput').value = appointmentId;
    const appt = allAppointments.find(a => a.id === appointmentId);
    if (appt) {
      const patRef = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
      currentPatientId   = patRef?.actor?.reference?.replace('Patient/', '') || '';
      currentPatientName = (allPatients[currentPatientId] || {}).name || 'Patient';
    }
    joinCall();
  }

  async function joinCall() {
    const appointmentId = document.getElementById('appointmentInput').value.trim();
    if (!appointmentId) { setJoinStatus('Enter an appointment code.'); return; }
    currentRoom = appointmentId;
    setJoinStatus('Connecting...');
    document.getElementById('joinBtn').disabled = true;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: {
          width:     { ideal: 640, max: 640 },
          height:    { ideal: 480, max: 480 },
          frameRate: { ideal: 24,  max: 30  }
        },
        audio: true
      });
      document.getElementById('localVideo').srcObject = localStream;
      pc = new RTCPeerConnection({ iceServers: ICE_SERVERS, sdpSemantics: 'unified-plan' });
      localStream.getTracks().forEach(t => {
        const sender = pc.addTrack(t, localStream);
        if (t.kind === 'video') {
          const params = sender.getParameters();
          if (!params.encodings || params.encodings.length === 0) params.encodings = [{}];
          params.encodings[0].maxBitrate = 500000;
          params.encodings[0].scaleResolutionDownBy = 1.0;
          params.encodings[0].maxFramerate = 24;
          sender.setParameters(params).catch(e => console.warn('setParameters error:', e));
        }
      });
      pc.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; setCallStatus('In consultation'); };
      pc.onicecandidate = (event) => {
        if (!event.candidate) return;
        safeSend({ type: 'candidate', room: currentRoom, candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex });
      };
      signalingSocket = new WebSocket(SIGNALING_URL);
      signalingSocket.onopen = () => {
        safeSend({ type: 'join', room: currentRoom });
        setJoinStatus('');
        showCallUI();
        setCallStatus('Waiting for patient...');
        // Show patient report read-only during call
        if (currentPatientId) viewPatientReport(currentPatientId, currentPatientName);
      };
      signalingSocket.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'offer') {
          setCallStatus('Patient connected — establishing call...');
          await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          safeSend({ type: 'answer', room: currentRoom, sdp: answer.sdp });
        }
        if (msg.type === 'candidate') {
          try { await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.sdpMid, sdpMLineIndex: msg.sdpMLineIndex })); } catch(e) { console.warn('ICE candidate error:', e); }
        }
        if (msg.type === 'leave') {
          document.getElementById('peerLeftOverlay').style.display = 'flex';
          const rv = document.getElementById('remoteVideo');
          rv.srcObject = null; rv.style.display = 'none';
        }
        if (msg.type === 'peer_joined') {
          setTimeout(() => {
            if (currentPatientId && (!fetchedObservations || fetchedObservations.length === 0)) {
              viewPatientReport(currentPatientId, currentPatientName);
            }
          }, 100);
        }
        // FIX 5: WebSocket 'chat' messages removed — chat is async via Medplum only
      };
      signalingSocket.onerror = () => setCallStatus('Signaling connection error.');
      signalingSocket.onclose = () => {};
    } catch(e) {
      setJoinStatus('Error: ' + e.message);
      document.getElementById('joinBtn').disabled = false;
      console.error(e);
    }
  }

  function endCall() {
    safeSend({ type: 'leave', room: currentRoom });
    signalingSocket?.close();
    pc?.close();
    localStream?.getTracks().forEach(t => t.stop());
    location.reload();
  }

  function toggleMute() {
    const track = localStream?.getAudioTracks()[0];
    if (!track) return;
    isMuted = !isMuted; track.enabled = !isMuted;
    document.querySelector('#muteBtn .ctrl-circle').textContent = isMuted ? '🔇' : '🎤';
    document.querySelector('#muteBtn .ctrl-circle').style.background = isMuted ? '#5BA4CF' : '#f3f3f3';
    document.querySelector('#muteBtn .ctrl-label').textContent = isMuted ? 'Unmute' : 'Mute';
  }

  function toggleCamera() {
    const track = localStream?.getVideoTracks()[0];
    if (!track) return;
    isCameraOff = !isCameraOff; track.enabled = !isCameraOff;
    document.querySelector('#cameraBtn .ctrl-circle').textContent = isCameraOff ? '🚫' : '📷';
    document.querySelector('#cameraBtn .ctrl-circle').style.background = isCameraOff ? '#5BA4CF' : '#f3f3f3';
    document.querySelector('#cameraBtn .ctrl-label').textContent = isCameraOff ? 'Start video' : 'Stop video';
  }

  function showCallUI() {
    isCallActive = true;
    document.getElementById('chatStripeBtn').classList.add('hidden');
    document.getElementById('joinScreen').style.display = 'none';
    document.getElementById('callScreen').style.display = 'block';
    updateBackBtn(); // hide back button during calls
  }

  function safeSend(obj) {
    if (signalingSocket && signalingSocket.readyState === WebSocket.OPEN) {
      signalingSocket.send(JSON.stringify(obj));
    }
  }

  function setJoinStatus(msg) { document.getElementById('statusText').textContent = msg; }
  function setCallStatus(msg)  { document.getElementById('callStatus').textContent = msg; }

  // ── Init ──────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Defer DOM-populating calls by 50ms to guarantee Safari has fully
    // parsed and rendered the select element before options are injected.
    setTimeout(() => {
      populateDoctorDropdown();
      showTodayDate();
      loadAppointments();
    }, 50);

    document.getElementById('doctorSelect').addEventListener('change', loadAppointments);
    document.getElementById('joinBtn').addEventListener('click', joinCall);
    document.getElementById('endBtn').addEventListener('click', endCall);
    document.getElementById('muteBtn').addEventListener('click', toggleMute);
    document.getElementById('cameraBtn').addEventListener('click', toggleCamera);
    document.getElementById('panelBtn').addEventListener('click', () => {
      if (panelOpen && currentPanelState === 'report') {
        closePanel();
      } else if (currentPatientId) {
        viewPatientReport(currentPatientId, currentPatientName);
      } else {
        openPanel();
      }
    });
    document.getElementById('panelCloseBtn').addEventListener('click', () => { if (panelOpen) togglePanel(); });
    const stripeBtn = document.getElementById('chatStripeBtn');
    stripeBtn.addEventListener('click', () => showPanelState('chat'));
    stripeBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      showPanelState('chat');
    }, { passive: false });
    document.getElementById('asyncChatSendBtn').addEventListener('click', sendMedplumChatMessage);
    document.getElementById('asyncChatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMedplumChatMessage(); });
    document.getElementById('peerLeftEndBtn').addEventListener('click', endCall);
    document.getElementById('appointmentInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinCall(); });
  });
</script>
</body>
</html>
