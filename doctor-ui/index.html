<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeleMed Hearth — Interfață Medic</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f9f9f9;
    color: #1a1c1c;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── LANGUAGE TOGGLE ─────────────────────────────────────── */
  #langToggle {
    position: fixed;
    top: 14px; right: 16px;
    z-index: 300;
    display: flex;
    background: #fff;
    border-radius: 20px;
    border: 1.5px solid #5BA4CF;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.10);
  }
  #langToggle.hidden { display: none; }
  #langToggle button {
    padding: 5px 13px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #5BA4CF;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  #langToggle button.active { background: #5BA4CF; color: #fff; }
  #langToggle button:hover:not(.active) { background: #eaf2f9; }

  /* ── SIDE PANEL ───────────────────────────────────────────── */
  #sidePanel {
    position: fixed;
    top: 0; right: 0;
    width: 360px; height: 100dvh;
    background: #fff;
    border-left: 1px solid #e0e0e0;
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    z-index: 200;
  }
  #sidePanel.open { transform: translateX(0); }
  @media (max-width: 1023px) { #sidePanel { width: 300px; } }
  @media (max-width: 767px)  { #sidePanel { width: 100%; } }

  #panelHeader {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #e8e8e8;
    background: #f9f9f9; flex-shrink: 0;
  }
  #panelTitle { font-size: 15px; font-weight: 700; color: #1a1c1c; flex: 1; }
  #backToListBtn { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 700; color: #5BA4CF; padding: 4px 8px 4px 0; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  #backToListBtn:hover { color: #3a82aa; }
  #panelCloseBtn { background: none; border: none; cursor: pointer; font-size: 20px; color: #40484e; padding: 4px; line-height: 1; }
  #panelCloseBtn:hover { color: #1a1c1c; }

  #panelContent { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  .panel-state { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel-state.active { display: flex; }

  /* ── CHAT STRIPE ─────────────────────────────────────────── */
  #chatStripeBtn {
    position: fixed;
    top: 50%; right: 0;
    transform: translateY(-50%);
    background: #5BA4CF; color: #fff;
    border: none; border-radius: 8px 0 0 8px;
    width: 36px; height: 80px;
    cursor: pointer; z-index: 201;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.15s;
    box-shadow: -2px 0 8px rgba(0,0,0,0.15);
    font-size: 11px; font-weight: 700;
    writing-mode: vertical-rl; text-orientation: mixed;
    letter-spacing: 0.08em;
    touch-action: manipulation;
  }
  #chatStripeBtn:hover { background: #3a82aa; }
  #chatStripeBtn.panel-open { transform: translateX(-360px) translateY(-50%); }
  #chatStripeBtn.hidden { display: none; }
  @media (max-width: 1023px) { #chatStripeBtn.panel-open { transform: translateX(-300px) translateY(-50%); } }
  @media (max-width: 767px)  { #chatStripeBtn.panel-open { transform: translateX(-100vw) translateY(-50%); } }

  /* ── MAIN CONTENT ────────────────────────────────────────── */
  #mainContent { width: 100%; min-height: 100dvh; transition: padding-right 0.28s cubic-bezier(0.4,0,0.2,1); }
  @media (min-width: 1024px) { #mainContent.panel-open { padding-right: 360px; } }

  /* ── JOIN SCREEN ─────────────────────────────────────────── */
  #joinScreen { display: flex; align-items: flex-start; justify-content: center; min-height: 100dvh; padding: 32px 24px; }
  .card { background: #fff; border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 540px; box-shadow: 0 4px 40px rgba(26,28,28,0.08); }
  .card-title { font-size: 22px; font-weight: 700; color: #1a1c1c; margin-bottom: 4px; }
  .card-subtitle { font-size: 15px; color: #40484e; margin-bottom: 24px; }
  .field-label { font-size: 13px; color: #40484e; font-weight: 600; margin-bottom: 8px; display: block; }
  select { width: 100%; height: 48px; font-size: 15px; border: 2px solid #5BA4CF; border-radius: 8px; padding: 0 12px; background: #f9f9f9; color: #1a1c1c; outline: none; cursor: pointer; margin-bottom: 16px; }
  select:focus { border-color: #3a82aa; background: #fff; }
  #todayDate { font-size: 13px; font-weight: 600; color: #5BA4CF; margin-bottom: 20px; letter-spacing: 0.02em; }
  .section-label { font-size: 12px; font-weight: 700; color: #40484e; letter-spacing: 0.06em; margin-bottom: 10px; }
  .appt-card { background: #f3f3f3; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .appt-patient { font-weight: 700; font-size: 15px; color: #1a1c1c; }
  .appt-time { font-size: 13px; color: #40484e; margin-top: 2px; }
  .appt-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .join-btn { background: #5BA4CF; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .join-btn:hover:not(:disabled) { background: #3a82aa; }
  .join-btn:disabled { background: #c4c4c4; color: #888; cursor: not-allowed; }
  .view-report-btn { background: none; border: 1.5px solid #5BA4CF; color: #5BA4CF; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .view-report-btn:hover { background: #eaf2f9; }
  .empty-state { font-size: 14px; color: #40484e; padding: 16px 0; text-align: center; }
  details { margin-top: 24px; border-top: 1px solid #e8e8e8; padding-top: 16px; }
  summary { cursor: pointer; font-size: 13px; color: #40484e; font-weight: 600; margin-bottom: 12px; }
  #appointmentInput { width: 100%; height: 48px; font-size: 15px; border: 2px solid #5BA4CF; border-radius: 8px; padding: 0 12px; outline: none; background: #f9f9f9; color: #1a1c1c; margin-bottom: 10px; }
  #appointmentInput:focus { border-color: #3a82aa; background: #fff; }
  #joinBtn { width: 100%; height: 52px; background: #5BA4CF; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  #joinBtn:hover { background: #3a82aa; }
  #statusText { margin-top: 12px; font-size: 14px; color: #40484e; min-height: 20px; text-align: center; }

  /* ── CALL SCREEN ─────────────────────────────────────────── */
  #callScreen { display: none; position: relative; width: 100%; height: 100dvh; background: #000; overflow: hidden; }
  #remoteVideo { width: 100%; height: 100%; background-color: #000; display: block; object-fit: contain; aspect-ratio: 16/9; }
  #localVideo { position: fixed; bottom: 128px; left: 16px; width: 160px; height: 120px; background: #222; border-radius: 8px; object-fit: cover; z-index: 10; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  #callStatus { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(26,28,28,0.75); color: #fff; font-size: 14px; padding: 8px 20px; border-radius: 999px; z-index: 30; }
  #controlBar { position: fixed; bottom: 0; left: 0; right: 0; height: 112px; background: rgba(249,249,249,0.95); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; gap: 32px; z-index: 20; transition: right 0.28s cubic-bezier(0.4,0,0.2,1); }
  @media (min-width: 1024px) { body.panel-open #controlBar { right: 360px; } }
  .ctrl-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; background: none; border: none; }
  .ctrl-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: background 0.15s, transform 0.1s; }
  .ctrl-circle:active { transform: scale(0.92); }
  .ctrl-label { font-size: 12px; color: #40484e; font-weight: 500; }
  #muteBtn   .ctrl-circle { background: #f3f3f3; }
  #cameraBtn .ctrl-circle { background: #f3f3f3; }
  #endBtn    .ctrl-circle { background: #ab1118; color: #fff; }
  #endBtn    .ctrl-label  { color: #ab1118; font-weight: 700; }
  #panelBtn  .ctrl-circle { background: #f3f3f3; }

  /* ── PEER LEFT OVERLAY ───────────────────────────────────── */
  #peerLeftOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 50; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #fff; text-align: center; padding: 32px; }
  #peerLeftOverlay p { font-size: 20px; font-weight: 600; max-width: 320px; }
  #peerLeftEndBtn { margin-top: 16px; padding: 14px 32px; background: #ab1118; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }

  /* ── PANEL: PATIENT REPORT STATE ────────────────────────── */
  #stateReport { overflow-y: auto; }
  #reportInner { padding: 16px; }
  #reportPatientName { font-size: 18px; font-weight: 700; color: #1a1c1c; margin-bottom: 4px; }
  #reportPatientMeta { font-size: 13px; color: #40484e; margin-bottom: 12px; }
  .report-section-title { font-size: 11px; font-weight: 700; color: #40484e; letter-spacing: 0.06em; text-transform: uppercase; margin: 14px 0 8px; }
  .condition-chip { display: inline-block; background: #E8F4FC; color: #1a6495; border-radius: 16px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin: 0 4px 6px 0; }
  .observation-entry { background: #f3f3f3; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: #1a1c1c; line-height: 1.5; }
  .observation-entry.reviewed { opacity: 0.6; border-left: 3px solid #c4c4c4; padding-left: 10px; }
  .observation-date { font-size: 11px; color: #40484e; margin-top: 4px; }
  .btn-mark-reviewed { flex: 1; margin-top: 0; padding: 7px; background: #f3f3f3; color: #1a1c1c; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-mark-reviewed:hover { background: #e0e0e0; }
  .btn-finalize { width: 100%; padding: 12px; margin-top: 16px; background: #5BA4CF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-finalize:hover:not(:disabled) { background: #3a82aa; }
  .btn-finalize:disabled { background: #c4c4c4; color: #888; cursor: not-allowed; }
  .obs-summary-label { font-size: 10px; color: #40484e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .btn-toggle-conv { width: 100%; margin-top: 6px; padding: 5px 0; background: none; border: none; color: #5BA4CF; font-size: 11px; font-weight: 700; cursor: pointer; text-align: left; }
  .btn-toggle-conv:hover { color: #3a82aa; }
  .conv-transcript { margin-top: 8px; display: none; border-top: 1px solid #e8e8e8; padding-top: 8px; max-height: 300px; overflow-y: auto; }
  .conv-transcript.expanded { display: block; }
  .conv-bubble-ai      { background: #f3f3f3; border-radius: 8px; padding: 5px 10px; margin: 3px 30px 3px 0; font-size: 12px; color: #1a1c1c; }
  .conv-bubble-patient { background: #E8F4FC; border-radius: 8px; padding: 5px 10px; margin: 3px 0 3px 30px; font-size: 12px; color: #1a1c1c; text-align: right; }
  .conv-bubble-doctor  { background: #E8F7EE; border-radius: 8px; padding: 5px 10px; margin: 3px 30px 3px 0; font-size: 12px; color: #1a6a3a; }

  /* ── OBS-LEVEL ACTION ROW ────────────────────────────────── */
  .obs-actions-row { display: flex; gap: 6px; margin-top: 8px; }
  .btn-add-note { flex: 1; padding: 7px; background: none; border: 1.5px solid #5BA4CF; color: #5BA4CF; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .btn-add-note:hover { background: #eaf2f9; }

  /* ── OBS-LEVEL CHAT SECTION ──────────────────────────────── */
  .obs-chat-section { display: none; flex-direction: column; margin-top: 10px; border: 1px solid #d4e9f7; border-radius: 8px; background: #fafcff; overflow: hidden; }
  .obs-chat-header { font-size: 11px; font-weight: 700; color: #40484e; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 12px 6px; border-bottom: 1px solid #e0eff8; background: #eaf2f9; }
  .obs-chat-messages { padding: 8px 12px; display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
  .obs-chat-transcript-block { background: #f3f3f3; border-radius: 6px; padding: 6px 8px; margin-bottom: 4px; font-size: 11px; color: #40484e; }
  .obs-chat-separator { height: 1px; background: #d4e9f7; margin: 6px 0; }
  .obs-chat-input-row { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #d4e9f7; background: #f0f7fd; flex-shrink: 0; }
  .obs-chat-input { flex: 1; height: 34px; border: 1.5px solid #c0d8ec; border-radius: 6px; padding: 0 10px; font-size: 13px; outline: none; background: #fff; color: #1a1c1c; }
  .obs-chat-input:focus { border-color: #5BA4CF; }
  .obs-chat-send-btn { height: 34px; padding: 0 14px; background: #5BA4CF; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .obs-chat-send-btn:hover { background: #3a82aa; }
  .obs-chat-send-btn:disabled { background: #c4c4c4; cursor: not-allowed; }
  .obs-chat-attach-btn { height: 34px; width: 34px; background: none; border: 1.5px solid #c0d8ec; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .obs-chat-attach-btn:hover { background: #e8f4fd; }
  .obs-chat-attach-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .obs-attachment-card { background: #fff; border: 1px solid #d4e9f7; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; max-width: 90%; }
  .obs-attachment-icon { font-size: 22px; flex-shrink: 0; }
  .obs-attachment-info { flex: 1; min-width: 0; }
  .obs-attachment-name { font-size: 12px; font-weight: 700; color: #1a1c1c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .obs-attachment-size { font-size: 11px; color: #40484e; }
  .obs-attachment-open { padding: 4px 10px; background: #5BA4CF; color: #fff; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  .obs-attachment-open:hover { background: #3a82aa; }
  .obs-chat-file-error { font-size: 11px; color: #ab1118; padding: 2px 0; }

  /* ── SHARED BUBBLE STYLES (obs chat + legacy) ─────────────── */
  .async-msg { max-width: 90%; padding: 7px 11px; border-radius: 10px; font-size: 13px; line-height: 1.45; }
  .async-msg.doctor { background: #E8F4FC; align-self: flex-end; color: #1a1c1c; }
  .async-msg.patient { background: #f0f0f0; align-self: flex-start; color: #1a1c1c; }
  .async-msg-label { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
  .async-msg.doctor .async-msg-label { color: #5BA4CF; }
  .async-msg.patient .async-msg-label { color: #40484e; }
  .chat-empty { font-size: 13px; color: #40484e; font-style: italic; padding: 8px 0; text-align: center; }
</style>
</head>
<body>

<!-- ── LANGUAGE TOGGLE ────────────────────────────────────── -->
<div id="langToggle">
  <button id="langRO">RO</button>
  <button id="langEN">EN</button>
</div>

<!-- ── SIDE PANEL ─────────────────────────────────────────── -->
<div id="sidePanel">
  <div id="panelHeader">
    <button id="backToListBtn" style="display:none;" onclick="backToAppointmentList()"></button>
    <span id="panelTitle"></span>
    <button id="panelCloseBtn">✕</button>
  </div>
  <div id="panelContent">
    <!-- Patient Triage Report (only panel state) -->
    <div id="stateReport" class="panel-state">
      <div id="reportInner">
        <div id="reportPatientName"></div>
        <div id="reportPatientMeta"></div>
        <div id="reportConditions"></div>
        <div id="reportObservations"></div>
        <div id="reportActions"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── REPORT STRIPE (opens Patient Report panel) ────────── -->
<button id="chatStripeBtn" title=""></button>

<!-- ── MAIN CONTENT ──────────────────────────────────────── -->
<div id="mainContent">

  <!-- JOIN SCREEN -->
  <div id="joinScreen">
    <div class="card">
      <p class="card-title" id="cardTitle"></p>
      <p class="card-subtitle" id="cardSubtitle"></p>

      <label class="field-label" for="doctorSelect" id="selectDoctorLabel"></label>
      <select id="doctorSelect"></select>

      <p id="todayDate"></p>
      <div id="appointmentsList"></div>

      <details>
        <summary id="orEnterManuallyLabel"></summary>
        <div style="margin-top:12px;">
          <label class="field-label" for="appointmentInput" id="apptCodeLabel"></label>
          <input id="appointmentInput" type="text" autocomplete="off" />
          <button id="joinBtn"></button>
        </div>
      </details>
      <p id="statusText"></p>
    </div>
  </div>

  <!-- CALL SCREEN -->
  <div id="callScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo"  autoplay playsinline muted></video>
    <div id="callStatus"></div>
    <div id="controlBar">
      <button class="ctrl-btn" id="muteBtn">
        <div class="ctrl-circle">🎤</div>
        <span class="ctrl-label" id="muteBtnLabel"></span>
      </button>
      <button class="ctrl-btn" id="endBtn">
        <div class="ctrl-circle">■</div>
        <span class="ctrl-label" id="endBtnLabel"></span>
      </button>
      <button class="ctrl-btn" id="cameraBtn">
        <div class="ctrl-circle">📷</div>
        <span class="ctrl-label" id="cameraBtnLabel"></span>
      </button>
      <button class="ctrl-btn" id="panelBtn">
        <div class="ctrl-circle">📋</div>
        <span class="ctrl-label" id="panelBtnLabel"></span>
      </button>
    </div>
  </div>

</div>

<!-- ── PEER LEFT OVERLAY ───────────────────────────────── -->
<div id="peerLeftOverlay">
  <p id="peerLeftMsg"></p>
  <button id="peerLeftEndBtn"></button>
</div>

<script>

  // Medplum 5.1.10 registers Communication.about as a SearchParameter but does
  // not index it (reindex requires super-admin). Using &about= returns HTTP 400.
  // Workaround: fetch ALL Communications for the patient (capped at 200 to cover
  // multiple Observation threads), cache per-patient, filter client-side per obsId.
  async function fetchObservationCommunications(observationId) {
    const token = await ensureToken();
    if (!token) throw new Error(t('alertNotAuth'));
    const patId = currentPatientId;

    // Cache miss — fetch all Communications for this patient.
    if (!communicationCache[patId]) {
      const res = await fetch(
        MEDPLUM_BASE + '/fhir/R4/Communication?subject=Patient/' + patId +
        '&_sort=sent&_count=200', // 200: hard cap covering multiple Observation threads
        { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' } }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const bundle = await res.json();
      communicationCache[patId] = (bundle.entry || []).map(e => e.resource).filter(Boolean);
    }

    // Client-side filter: keep only Communications whose about[] references this Observation.
    const targetRef = 'Observation/' + observationId;
    return communicationCache[patId].filter(c =>
      (c.about || []).some(a => a.reference === targetRef)
    );
  }

  // Renders a Communication with a contentAttachment as a clickable attachment card.
  // Accepts inline base64 data OR a Communication resource (extracts from payload[1]).
  function appendAttachmentBubble(container, title, size, contentType, base64Data, isPatient) {
    const isPdf = (contentType || '').startsWith('application/pdf');
    const icon  = isPdf ? '📄' : '🖼';
    const humanSize = size > 1024 * 1024
        ? (size / 1024 / 1024).toFixed(1) + ' MB'
        : Math.round(size / 1024) + ' KB';
    const wrap = document.createElement('div');
    wrap.className = 'async-msg ' + (isPatient ? 'patient' : 'doctor');
    const card = document.createElement('div');
    card.className = 'obs-attachment-card';
    const iconEl = document.createElement('span');
    iconEl.className = 'obs-attachment-icon';
    iconEl.textContent = icon;
    const info = document.createElement('div');
    info.className = 'obs-attachment-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'obs-attachment-name';
    nameEl.textContent = title;
    const sizeEl = document.createElement('div');
    sizeEl.className = 'obs-attachment-size';
    sizeEl.textContent = humanSize;
    info.appendChild(nameEl);
    info.appendChild(sizeEl);
    const openBtn = document.createElement('button');
    openBtn.className = 'obs-attachment-open';
    openBtn.textContent = t('openAttachment');
    openBtn.addEventListener('click', () => {
      const byteChars = atob(base64Data);
      const byteArr = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
      const blob = new Blob([byteArr], { type: contentType });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    });
    card.appendChild(iconEl);
    card.appendChild(info);
    card.appendChild(openBtn);
    wrap.appendChild(card);
    container.appendChild(wrap);
  }

  // Renders a Communication that may carry text OR an attachment.
  function renderCommBubble(container, comm) {
    const payloadList = comm.payload || [];
    const attachment = payloadList.find(p => p.contentAttachment)?.contentAttachment;
    const isPatient = isPatientFlag(comm.extension || []);
    const sentStr = comm.sent || '';
    if (attachment && attachment.data) {
      appendAttachmentBubble(container, attachment.title || 'file', attachment.size || 0, attachment.contentType || '', attachment.data, isPatient);
    } else {
      const text = payloadList[0]?.contentString || '';
      appendObsBubble(container, text, isPatient, sentStr);
    }
  }

  async function sendObservationMessage(observationId, text, msgsEl, inputEl, sendBtn) {
    inputEl.disabled = true; sendBtn.disabled = true;
    const currentDoctorId = document.getElementById('doctorSelect').value;
    try {
      const token = await ensureToken();
      if (!token) { alert(t('alertNotAuth')); return; }
      const payload = {
        resourceType: 'Communication',
        status: 'completed',
        sent: new Date().toISOString(),
        subject: { reference: 'Patient/' + currentPatientId },
        sender: { reference: 'Practitioner/' + currentDoctorId },
        about: [{ reference: 'Observation/' + observationId }],
        payload: [{ contentString: text }],
        extension: [{ url: 'https://telemed-bogheanu.ro/fhir/ext/isPatient', valueBoolean: false }],
      };
      const res = await fetch(MEDPLUM_BASE + '/fhir/R4/Communication', {
        method: 'POST',
        headers: { 'Content-Type': 'application/fhir+json', 'Authorization': 'Bearer ' + (await ensureToken()), 'Accept': 'application/fhir+json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Invalidate Communication cache so the next thread open re-fetches.
      delete communicationCache[currentPatientId];
      // Remove "no messages" placeholder if present
      const emptyEl = msgsEl.querySelector('.chat-empty');
      if (emptyEl) emptyEl.remove();
      appendObsBubble(msgsEl, text, false, new Date().toISOString());
      msgsEl.scrollTop = msgsEl.scrollHeight;
    } catch(e) {
      alert(t('alertSendFailed', { error: e.message }));
    } finally {
      inputEl.disabled = false; sendBtn.disabled = false; inputEl.focus();
    }
  }

  // ── Appointment status derivation ────────────────────────────────────────────
  // Returns a canonical code: 'booked' | 'fulfilled' | 'postponed' | 'cancelled'
  function deriveApptStatusCode(appt, observations) {
    const raw = (appt.status || '').toLowerCase();
    if (raw === 'fulfilled') return 'fulfilled';
    if (raw === 'cancelled' || raw === 'noshow') return 'cancelled';
    if (raw !== 'booked' && raw !== 'confirmed') return 'booked';

    const start = appt.start ? new Date(appt.start) : null;
    if (!start) return 'booked';
    const end = appt.end ? new Date(appt.end) : new Date(start.getTime() + 30 * 60 * 1000);
    const pastThreshold = new Date(end.getTime() + 5 * 60 * 1000);

    if (Date.now() < pastThreshold.getTime()) return 'booked';

    // Past appointment — check for a linked Observation within ±2 hours.
    const twoHours = 2 * 60 * 60 * 1000;
    const hasObs = (observations || []).some(obs => {
      const obsDateStr = obs.effectiveDateTime || obs.recordedDate || '';
      if (!obsDateStr) return false;
      const obsDate = new Date(obsDateStr);
      return Math.abs(obsDate.getTime() - start.getTime()) <= twoHours;
    });
    return hasObs ? 'fulfilled' : 'postponed';
  }

  function deriveApptStatusLabel(appt, observations) {
    switch (deriveApptStatusCode(appt, observations)) {
      case 'fulfilled':  return t('apptStatusFinalized');
      case 'cancelled':  return t('apptStatusCancelled');
      case 'postponed':  return t('apptStatusPostponed');
      default:           return t('apptStatusConfirmed');
    }
  }

    switch (code) {
      case 'fulfilled':  return '#16A34A';
      case 'cancelled':  return '#AB1118';
      case 'postponed':  return '#D97706';
      default:           return '#5BA4CF';
    }
  }

  // ── Appointments ─────────────────────────────────────────────────────────────
  async function loadAppointments() {
    const listEl = document.getElementById('appointmentsList');
    const doctorId = document.getElementById('doctorSelect').value;
    observationCache   = {}; // clear caches for fresh session
    communicationCache = {};
    listEl.innerHTML = '<p class="empty-state">' + esc(t('loadingAppts')) + '</p>';
    medplumToken = await fetchMedplumToken();
    if (!medplumToken) { listEl.innerHTML = '<p class="empty-state">' + esc(t('authErrAppts')) + '</p>'; return; }
    try {
      const now = new Date(), pad = n => String(n).padStart(2, '0');
      const localToday = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      const tmr = new Date(now); tmr.setDate(tmr.getDate() + 1);
      const localTomorrow = `${tmr.getFullYear()}-${pad(tmr.getMonth()+1)}-${pad(tmr.getDate())}`;
      const url = MEDPLUM_BASE + '/fhir/R4/Appointment?date=ge' + localToday + 'T00:00:00Z&date=lt' + localTomorrow + 'T00:00:00Z&status=booked&_include=Appointment:actor&_count=50';
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + medplumToken, 'Accept': 'application/fhir+json' } });
      if (!res.ok) throw new Error('Appointment fetch failed: ' + res.status);
      const bundle = await res.json();
      allPatients = {};
      (bundle.entry || []).forEach(e => {
        if (e.resource?.resourceType === 'Patient') {
          const n = e.resource.name?.[0];
          allPatients[e.resource.id] = { name: n ? ((n.given || []).join(' ') + ' ' + (n.family || '')).trim() : t('patientFallback'), resource: e.resource };
        }
      });
      allAppointments = (bundle.entry || [])
        .map(e => e.resource)
        .filter(r => { if (r?.resourceType !== 'Appointment') return false; return (r.participant || []).some(p => p.actor?.reference === 'Practitioner/' + doctorId); })
        .sort((a, b) => new Date(a.start) - new Date(b.start));
      renderAppointments(listEl);
      // Parallel-fetch each unique patient's Observations in the background,
      // then update only the status chips in-place — no full list rebuild.
      prefetchObservationsAndUpdateChips(listEl);
    } catch(e) {
      console.error('Appointment load error:', e);
      listEl.innerHTML = '<p class="empty-state">' + esc(t('errLoadAppts')) + '</p>';
    }
  }

  async function prefetchObservationsAndUpdateChips() {
    const uniquePatIds = [...new Set(
      allAppointments.map(appt => {
        const patRef = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
        return patRef?.actor?.reference?.replace('Patient/', '') || '';
      }).filter(Boolean)
    )];
    if (uniquePatIds.length === 0) return;
    const token = await ensureToken();
    if (!token) return;
    await Promise.all(uniquePatIds.map(async patId => {
      try {
        const res = await fetch(
          MEDPLUM_BASE + '/fhir/R4/Observation?subject=Patient/' + patId + '&_sort=-date&_count=20',
          { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' } }
        );
        observationCache[patId] = res.ok
          ? (await res.json()).entry?.map(e => e.resource).filter(Boolean) || []
          : [];
      } catch(_) {
        observationCache[patId] = [];
      }
    }));
    updateAppointmentStatusChips();
  }

  function updateAppointmentStatusChips() {
    allAppointments.forEach(appt => {
      const chipEl = document.querySelector('[data-appt-chip="' + CSS.escape(appt.id || '') + '"]');
      if (!chipEl) return;
      const patRef = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
      const patId  = patRef?.actor?.reference?.replace('Patient/', '') || '';
      const obs    = observationCache[patId] || [];
      const code   = deriveApptStatusCode(appt, obs);
      chipEl.textContent = deriveApptStatusLabel(appt, obs);
      chipEl.style.color = apptStatusColor(code);
    });
  }

  function renderAppointments(listEl) {
    listEl.innerHTML = '';
    if (allAppointments.length === 0) { listEl.innerHTML = '<p class="empty-state">' + esc(t('noApptsToday')) + '</p>'; return; }
    const header = document.createElement('p');
    header.className = 'section-label'; header.textContent = t('todaysAppts');
    listEl.appendChild(header);
    const locale = currentLang === 'ro' ? 'ro-RO' : 'en-GB';
    allAppointments.forEach(appt => {
      const apptId = appt.id || '';
      const start  = appt.start ? new Date(appt.start) : null;
      const timeStr = start ? start.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' }) : '--:--';
      const patRef = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
      const patId  = patRef?.actor?.reference?.replace('Patient/', '') || '';
      const patName = (allPatients[patId] || {}).name || t('patientFallback');
      const joinable = start ? isJoinable(appt.start) : false;
      // Use prefetch cache if available; falls back to fetchedObservations for
      // the currently-selected patient (which may be more up-to-date after
      // viewPatientReport loads it); otherwise empty (chip shows "Confirmed").
      const apptObs = observationCache[patId]
        || (patId && patId === currentPatientId ? fetchedObservations : []);
      const statusCode  = deriveApptStatusCode(appt, apptObs);
      const statusLabel = deriveApptStatusLabel(appt, apptObs);
      const statusCol   = apptStatusColor(statusCode);
      const card = document.createElement('div');
      card.className = 'appt-card';
      card.innerHTML =
        '<div style="flex:1;">' +
          '<div class="appt-patient">' + esc(patName) + '</div>' +
          '<div class="appt-time">&#128336; ' + timeStr +
            ' <span data-appt-chip="' + esc(apptId) + '" style="margin-left:8px;font-size:11px;font-weight:700;color:' + esc(statusCol) + '">' + esc(statusLabel) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="appt-actions"><button class="join-btn"' + (joinable ? '' : ' disabled') + '>' + esc(t('joinConsultation')) + '</button>' +
        '<button class="view-report-btn">' + esc(t('viewReport')) + '</button></div>';
      card.querySelector('.join-btn').addEventListener('click', e => { e.stopPropagation(); joinWithId(apptId); });
      card.querySelector('.view-report-btn').addEventListener('click', e => {
        e.stopPropagation();
        currentPatientId = patId; currentPatientName = patName;
        viewPatientReport(patId, patName);
      });
      listEl.appendChild(card);
    });
  }

  // ── Patient report ────────────────────────────────────────────────────────────
  async function viewPatientReport(patientId, patientName) {
    reviewedInSession = new Set(); fetchedObservations = [];
    document.getElementById('reportPatientName').textContent = patientName;
    document.getElementById('reportPatientMeta').textContent = t('loadingClinical');
    document.getElementById('reportConditions').innerHTML = '';
    document.getElementById('reportObservations').innerHTML = '';
    document.getElementById('reportActions').innerHTML = '';
    showPanelState('report');
    updateBackBtn();
    updateChatStripeVisibility();
    const actEl = document.getElementById('reportActions');
    if (actEl) actEl.style.display = isCallActive ? 'none' : '';
    const token = await ensureToken();
    if (!token) { document.getElementById('reportPatientMeta').textContent = t('authErrClinical'); return; }
    try {
      const headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' };
      const [condRes, obsRes] = await Promise.all([
        fetch(MEDPLUM_BASE + '/fhir/R4/Condition?patient=' + patientId + '&_count=20', { headers }),
        fetch(MEDPLUM_BASE + '/fhir/R4/Observation?patient=' + patientId + '&_sort=-date&_count=10', { headers }),
      ]);
      const conditions   = condRes.ok ? (await condRes.json()).entry?.map(e => e.resource).filter(Boolean) || [] : [];
      const observations = obsRes.ok  ? (await obsRes.json()).entry?.map(e => e.resource).filter(Boolean) || []  : [];
      fetchedObservations = observations;
      const patInfo = allPatients[patientId];
      if (patInfo?.resource) {
        const dob = patInfo.resource.birthDate || '';
        const gender = patInfo.resource.gender || '';
        document.getElementById('reportPatientMeta').textContent = [gender, dob ? t('dobLabel', { date: dob }) : ''].filter(Boolean).join(' · ') || '';
      } else { document.getElementById('reportPatientMeta').textContent = ''; }
      const condEl = document.getElementById('reportConditions');
      if (conditions.length > 0) {
        condEl.innerHTML = '<div class="report-section-title">' + esc(t('activeConditions')) + '</div>';
        conditions.forEach(c => {
          const chip = document.createElement('span');
          chip.className = 'condition-chip'; chip.textContent = c.code?.text || c.code?.coding?.[0]?.display || t('unknownCondition');
          condEl.appendChild(chip);
        });
      }
      const obsEl = document.getElementById('reportObservations');
      obsEl.innerHTML = '<div class="report-section-title">' + esc(t('triageObs')) + '</div>';
      if (observations.length > 0) {
        const dateLocaleStr = currentLang === 'ro' ? 'ro-RO' : 'en-GB';
        observations.forEach(obs => {
          const entry = document.createElement('div');
          const reviewed = obs.status === 'final';
          entry.className = 'observation-entry' + (reviewed ? ' reviewed' : '');
          const val      = obs.valueString || '';
          const noteText = obs.note?.[0]?.text || '';
          const date     = obs.effectiveDateTime ? new Date(obs.effectiveDateTime).toLocaleDateString(dateLocaleStr, { day: '2-digit', month: 'short', year: 'numeric' }) : '';
          const obsExts  = obs.extension || [];
          const reviewedByTargetRef = obsExts.find(e => e.url && e.url.includes('reviewed-by-target'))?.valueString || null;
          const assignedDoctor = reviewedByTargetRef ? DOCTORS.find(d => reviewedByTargetRef.includes(d.id)) : null;
          const assignedLabel  = assignedDoctor ? assignedDoctor.name : (reviewedByTargetRef ? reviewedByTargetRef : null);
          const recordedByName = obsExts.find(e => e.url === 'https://telemed-bogheanu.ro/fhir/ext/doctor-name')?.valueString || null;
          const aiLines = noteText.split('\n').filter(l => l.startsWith('[AI]'));
          const lastAi  = aiLines.length > 0 ? aiLines[aiLines.length - 1].replace(/^\[AI\]\s*\d+:\d+:\s*/, '').trim() : '';
          const summary = lastAi || val;
          const summaryDisplay = summary.substring(0, 200) + (summary.length > 200 ? '…' : '');

          entry.innerHTML =
            '<div class="obs-summary-label">' + esc(t('clinicalSummary')) + '</div>' +
            '<div>' + esc(summaryDisplay) + '</div>' +
            '<div class="observation-date">' + esc(date) + (reviewed ? ' · ' + esc(t('reviewed')) : '') +
            (assignedLabel ? ' · ' + esc(t('assignedTo', { name: assignedLabel })) : '') + '</div>' +
            (recordedByName ? '<div class="observation-date" style="color:#5BA4CF;">' + esc(t('recordedBy', { name: recordedByName })) + '</div>' : '');

          if (reviewed) {
            // Locked card — no transcript, no chat, no action buttons
            obsEl.appendChild(entry);
            return;
          }

          // Conversation transcript toggle
          if (noteText) {
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'btn-toggle-conv';
            toggleBtn.textContent = t('showConv');
            const transcript = renderTranscript(noteText);
            toggleBtn.addEventListener('click', () => {
              const expanded = transcript.classList.toggle('expanded');
              toggleBtn.textContent = expanded ? t('hideConv') : t('showConv');
            });
            entry.appendChild(toggleBtn);
            entry.appendChild(transcript);
          }

          if (!isCallActive) {
            // Action buttons row
            const actionsRow = document.createElement('div');
            actionsRow.className = 'obs-actions-row';

            const mrBtn = document.createElement('button');
            mrBtn.className = 'btn-mark-reviewed';
            mrBtn.textContent = t('markReviewed');
            mrBtn.addEventListener('click', () => markReviewed(obs.id, mrBtn, entry));
            actionsRow.appendChild(mrBtn);

            const noteBtn = document.createElement('button');
            noteBtn.className = 'btn-add-note';
            noteBtn.textContent = t('addNote');
            actionsRow.appendChild(noteBtn);
            entry.appendChild(actionsRow);

            // Inline chat section (collapsed by default)
            const chatSection = document.createElement('div');
            chatSection.className = 'obs-chat-section';
            chatSection.innerHTML =
              '<div class="obs-chat-header">' + esc(t('transcriptLabel')) + '</div>' +
              '<div class="obs-chat-messages"></div>' +
              '<div class="obs-chat-input-row">' +
                '<button class="obs-chat-attach-btn" title="' + esc(t('attachFile')) + '">📎</button>' +
                '<input type="file" class="obs-chat-file-input" accept="application/pdf,image/*" style="display:none" />' +
                '<input type="text" class="obs-chat-input" placeholder="' + esc(t('chatPlaceholder')) + '" />' +
                '<button class="obs-chat-send-btn">' + esc(t('send')) + '</button>' +
              '</div>' +
              '<div class="obs-chat-file-error" style="display:none;padding:0 12px 6px;"></div>';
            entry.appendChild(chatSection);

            const msgsEl      = chatSection.querySelector('.obs-chat-messages');
            const inputEl     = chatSection.querySelector('.obs-chat-input');
            const sendBtn     = chatSection.querySelector('.obs-chat-send-btn');
            const attachBtn   = chatSection.querySelector('.obs-chat-attach-btn');
            const fileInput   = chatSection.querySelector('.obs-chat-file-input');
            const fileErrEl   = chatSection.querySelector('.obs-chat-file-error');

            // Paperclip button opens hidden file picker
            attachBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', async () => {
              const file = fileInput.files[0];
              fileInput.value = '';
              if (!file) return;
              fileErrEl.style.display = 'none';
              const MAX = 5 * 1024 * 1024;
              if (file.size > MAX) { fileErrEl.textContent = t('fileTooLarge'); fileErrEl.style.display = 'block'; return; }
              attachBtn.disabled = true; sendBtn.disabled = true;
              const currentDoctorId = document.getElementById('doctorSelect').value;
              try {
                const base64 = await new Promise((resolve, reject) => {
                  const reader = new FileReader();
                  reader.onload = () => resolve(reader.result.split(',')[1]);
                  reader.onerror = reject;
                  reader.readAsDataURL(file);
                });
                const token = await ensureToken();
                if (!token) throw new Error(t('alertNotAuth'));
                const body = {
                  resourceType: 'Communication', status: 'completed',
                  sent: new Date().toISOString(),
                  subject: { reference: 'Patient/' + currentPatientId },
                  sender: { reference: 'Practitioner/' + currentDoctorId },
                  about: [{ reference: 'Observation/' + obs.id }],
                  payload: [
                    { contentString: '📎 ' + file.name },
                    { contentAttachment: { contentType: file.type, data: base64, title: file.name, size: file.size } }
                  ],
                  extension: [{ url: 'https://telemed-bogheanu.ro/fhir/ext/isPatient', valueBoolean: false }],
                };
                const res = await fetch(MEDPLUM_BASE + '/fhir/R4/Communication', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/fhir+json', 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' },
                  body: JSON.stringify(body),
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                delete communicationCache[currentPatientId];
                // Append local attachment bubble
                appendAttachmentBubble(msgsEl, file.name, file.size, file.type, base64, false);
                msgsEl.scrollTop = msgsEl.scrollHeight;
              } catch(e) {
                fileErrEl.textContent = t('alertSendFailed', { error: e.message });
                fileErrEl.style.display = 'block';
              } finally {
                attachBtn.disabled = false; sendBtn.disabled = false;
              }
            });

            // Note button toggles chat section
            noteBtn.addEventListener('click', async () => {
              const isOpen = chatSection.style.display === 'flex';
              if (isOpen) {
                chatSection.style.display = 'none';
                noteBtn.textContent = t('addNote');
              } else {
                chatSection.style.display = 'flex';
                chatSection.style.flexDirection = 'column';
                noteBtn.textContent = t('closeNote');
                if (!chatSection.dataset.loaded) {
                  chatSection.dataset.loaded = 'true';
                  // Render original transcript as leading block
                  if (noteText) {
                    const transcriptBlock = document.createElement('div');
                    transcriptBlock.className = 'obs-chat-transcript-block';
                    transcriptBlock.appendChild(renderTranscript(noteText));
                    msgsEl.appendChild(transcriptBlock);
                    const sep = document.createElement('div');
                    sep.className = 'obs-chat-separator';
                    msgsEl.appendChild(sep);
                  }
                  // Load Communications for this Observation
                  try {
                    const comms = await fetchObservationCommunications(obs.id);
                    if (comms.length === 0) {
                      const p = document.createElement('p');
                      p.className = 'chat-empty'; p.textContent = t('noMessages');
                      msgsEl.appendChild(p);
                    } else {
                      comms.forEach(comm => {
                        renderCommBubble(msgsEl, comm);
                      });
                    }
                  } catch(e) {
                    const p = document.createElement('p');
                    p.style.cssText = 'color:red;font-size:12px;padding:4px 0;';
                    p.textContent = t('errLoadChat', { error: e.message });
                    msgsEl.appendChild(p);
                  }
                  msgsEl.scrollTop = msgsEl.scrollHeight;
                }
                setTimeout(() => inputEl.focus(), 100);
              }
            });

            // Send button handler
            const doSend = async () => {
              const text = inputEl.value.trim();
              if (!text) return;
              inputEl.value = '';
              await sendObservationMessage(obs.id, text, msgsEl, inputEl, sendBtn);
            };
            sendBtn.addEventListener('click', doSend);
            inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
          }

          obsEl.appendChild(entry);
        });
      } else {
        obsEl.innerHTML += '<p class="empty-state" style="text-align:left;">' + esc(t('noObs')) + '</p>';
      }
      if (!isCallActive) {
        const actEl2 = document.getElementById('reportActions');
        const finBtn = document.createElement('button');
        finBtn.id = 'finalizeBtn'; finBtn.className = 'btn-finalize'; finBtn.textContent = t('finalizeReport');
        finBtn.addEventListener('click', () => finalizeReport(finBtn));
        actEl2.appendChild(finBtn);
        updateFinalizeButton();
      }
    } catch(e) { console.error('Report load error:', e); document.getElementById('reportPatientMeta').textContent = t('errLoadClinical'); }
  }

  async function markReviewed(obsId, btn, entryEl) {
    if (!currentPatientId) { alert(t('alertSelectPatient')); return; }
    if (!obsId) return;
    btn.disabled = true; btn.textContent = t('marking');
    const token = await ensureToken();
    if (!token) { btn.disabled = false; btn.textContent = t('markReviewed'); return; }
    try {
      const getRes = await fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' } });
      if (!getRes.ok) throw new Error('GET failed: ' + getRes.status);
      const obs = await getRes.json();
      const currentDoctorId = document.getElementById('doctorSelect').value;
      // Strip any pre-existing entries for these two URLs before appending fresh ones.
      // Guards against duplicate extensions if two doctors click simultaneously.
      const REVIEWED_BY_URL      = 'https://telemed-bogheanu.ro/fhir/ext/reviewed-by';
      const REFRESH_NEEDED_URL   = 'https://telemed-bogheanu.ro/fhir/ext/summary-refresh-needed';
      const baseExtensions = (obs.extension || []).filter(
        e => e.url !== REVIEWED_BY_URL && e.url !== REFRESH_NEEDED_URL
      );
      const updatedExtensions = [
        ...baseExtensions,
        { url: REVIEWED_BY_URL,    valueString: 'Practitioner/' + currentDoctorId },
        { url: REFRESH_NEEDED_URL, valueBoolean: true },
      ];
      const patchRes = await fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json-patch+json', 'Accept': 'application/fhir+json' },
        body: JSON.stringify([{ op: 'replace', path: '/extension', value: updatedExtensions }]),
      });
      if (patchRes.ok) {
        entryEl.classList.add('reviewed');
        btn.textContent = t('reviewedDone');
        btn.style.cssText = 'flex:1;padding:7px;background:#16A34A;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:default;';
        btn.disabled = true;
        reviewedInSession.add(obsId);
        updateFinalizeButton();
        // Lock the card: remove chat section, note button, transcript toggle
        const chatSection = entryEl.querySelector('.obs-chat-section');
        if (chatSection) chatSection.remove();
        const noteBtn = entryEl.querySelector('.btn-add-note');
        if (noteBtn) noteBtn.parentElement?.remove(); // remove actionsRow
        const convBtn = entryEl.querySelector('.btn-toggle-conv');
        if (convBtn) { convBtn.nextElementSibling?.remove(); convBtn.remove(); }
      } else { btn.disabled = false; btn.textContent = t('markReviewed'); }
    } catch(e) { btn.disabled = false; btn.textContent = t('markReviewed'); console.error('Mark reviewed error:', e); }
  }

  async function finalizeReport(btn) {
    if (!currentPatientId) { alert(t('alertSelectPatient')); return; }
    if (reviewedInSession.size === 0) return;
    btn.disabled = true; btn.textContent = t('finalizing');
    const token = await ensureToken();
    if (!token) { btn.disabled = false; btn.textContent = t('finalizeReport'); return; }
    try {
      await Promise.all([...reviewedInSession].map(obsId =>
        fetch(MEDPLUM_BASE + '/fhir/R4/Observation/' + obsId, {
          method: 'PATCH',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json-patch+json', 'Accept': 'application/fhir+json' },
          body: JSON.stringify([{ op: 'replace', path: '/status', value: 'final' }]),
        }).then(r => { if (!r.ok) throw new Error('PATCH ' + obsId + ' failed: ' + r.status); })
      ));
      btn.textContent = t('reportFinalized'); btn.style.background = '#16A34A'; btn.disabled = true; reviewedInSession.clear();
    } catch(e) { btn.disabled = false; btn.textContent = t('finalizeReport'); console.error('Finalize error:', e); }
  }

  function updateFinalizeButton() {
    const finBtn = document.getElementById('finalizeBtn');
    if (!finBtn) return;
    finBtn.disabled = reviewedInSession.size === 0;
  }

  // ── PDF upload ────────────────────────────────────────────────────────────────
  async function uploadAndSendPdf(file) {
    const filename = file.name;
    try {
      const token = await ensureToken();
      if (!token) throw new Error(t('alertNotAuth'));
      const base = MEDPLUM_BASE + '/fhir/R4';
      const arrayBuffer = await file.arrayBuffer();
      const binRes = await fetch(base + '/Binary', { method: 'POST', headers: { 'Content-Type': 'application/pdf', 'Authorization': 'Bearer ' + token }, body: arrayBuffer });
      if (!binRes.ok) throw new Error('Binary upload failed: ' + binRes.status);
      const binaryId = (await binRes.json()).id;
      if (!binaryId) throw new Error('No Binary ID returned');
      const docRefPayload = { resourceType: 'DocumentReference', status: 'current', content: [{ attachment: { contentType: 'application/pdf', url: 'Binary/' + binaryId, title: filename } }] };
      if (currentPatientId) docRefPayload.subject = { reference: 'Patient/' + currentPatientId };
      const drRes = await fetch(base + '/DocumentReference', { method: 'POST', headers: { 'Content-Type': 'application/fhir+json', 'Authorization': 'Bearer ' + token, 'Accept': 'application/fhir+json' }, body: JSON.stringify(docRefPayload) });
      if (!drRes.ok) throw new Error('DocumentReference creation failed: ' + drRes.status);
      alert(t('alertPdfUploaded', { name: filename }));
    } catch(e) { console.error('PDF upload error:', e); alert(t('alertPdfFailed', { error: e.message })); }
  }

  // ── WebRTC / signaling ────────────────────────────────────────────────────────
  function joinWithId(appointmentId) {
    document.getElementById('appointmentInput').value = appointmentId;
    const appt = allAppointments.find(a => a.id === appointmentId);
    if (appt) {
      const patRef = (appt.participant || []).find(p => p.actor?.reference?.startsWith('Patient/'));
      currentPatientId   = patRef?.actor?.reference?.replace('Patient/', '') || '';
      currentPatientName = (allPatients[currentPatientId] || {}).name || t('patientFallback');
    }
    joinCall();
  }

  async function joinCall() {
    const appointmentId = document.getElementById('appointmentInput').value.trim();
    if (!appointmentId) { setJoinStatus(t('enterApptCode')); return; }
    currentRoom = appointmentId;
    setJoinStatus(t('connecting'));
    document.getElementById('joinBtn').disabled = true;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640, max: 640 }, height: { ideal: 480, max: 480 }, frameRate: { ideal: 24, max: 30 } },
        audio: true
      });
      document.getElementById('localVideo').srcObject = localStream;
      pc = new RTCPeerConnection({ iceServers: ICE_SERVERS, sdpSemantics: 'unified-plan' });
      localStream.getTracks().forEach(tr => {
        const sender = pc.addTrack(tr, localStream);
        if (tr.kind === 'video') {
          const params = sender.getParameters();
          if (!params.encodings || params.encodings.length === 0) params.encodings = [{}];
          params.encodings[0].maxBitrate = 500000;
          params.encodings[0].scaleResolutionDownBy = 1.0;
          params.encodings[0].maxFramerate = 24;
          sender.setParameters(params).catch(e => console.warn('setParameters error:', e));
        }
      });
      pc.ontrack = event => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
        setCallStatus(t('inConsultation'));
      };

      // Call state indicator — updates #callStatus with connection state + duration.
      function updateCallStateLabel(stateLabel, color) {
        const elapsed = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;
        const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
        const ss = String(elapsed%60).padStart(2,'0');
        const el = document.getElementById('callStatus');
        el.textContent = stateLabel + ' · ' + mm + ':' + ss;
        el.style.background = color;
      }
      setInterval(() => {
        if (!isCallActive || !callStartTime) return;
        const cs = pc?.connectionState || 'new';
        const colors = { connected:'rgba(22,163,74,0.85)', connecting:'rgba(202,138,4,0.85)',
                         disconnected:'rgba(234,88,12,0.85)', failed:'rgba(171,17,24,0.85)',
                         closed:'rgba(64,72,78,0.85)', new:'rgba(26,28,28,0.75)' };
        updateCallStateLabel(cs.charAt(0).toUpperCase()+cs.slice(1), colors[cs]||colors.new);
      }, 1000);
      pc.onicecandidate = event => {
        if (!event.candidate) return;
        safeSend({ type: 'candidate', room: currentRoom, candidate: event.candidate.candidate, sdpMid: event.candidate.sdpMid, sdpMLineIndex: event.candidate.sdpMLineIndex });
      };
      // RTCPeerConnection/IceConnectionState 'disconnected' is TRANSIENT — fires during
      // ICE renegotiation and normally resolves to 'connected' within seconds.
      // Only 'failed'/'closed' are definitive; 'disconnected' starts a 10s debounce.
      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        console.log('Doctor UI: peer connectionState →', s);
        if (s === 'failed' || s === 'closed') {
          clearTimeout(disconnectDebounce); disconnectDebounce = null;
          showPeerLeft();
        } else if (s === 'disconnected') {
          if (!disconnectDebounce) {
            disconnectDebounce = setTimeout(() => {
              console.log('Doctor UI: peer stayed Disconnected for 10s → showPeerLeft');
              disconnectDebounce = null;
              showPeerLeft();
            }, 10000);
          }
        } else {
          clearTimeout(disconnectDebounce); disconnectDebounce = null;
        }
      };
      pc.oniceconnectionstatechange = () => {
        const s = pc.iceConnectionState;
        console.log('Doctor UI: ICE connectionState →', s);
        if (s === 'failed') {
          clearTimeout(disconnectDebounce); disconnectDebounce = null;
          showPeerLeft();
        } else if (s === 'disconnected') {
          if (!disconnectDebounce) {
            disconnectDebounce = setTimeout(() => {
              console.log('Doctor UI: ICE stayed Disconnected for 10s → showPeerLeft');
              disconnectDebounce = null;
              showPeerLeft();
            }, 10000);
          }
        } else {
          clearTimeout(disconnectDebounce); disconnectDebounce = null;
        }
      };
      signalingSocket = new WebSocket(SIGNALING_URL);
      signalingSocket.onopen = () => {
        safeSend({ type: 'join', room: currentRoom });
        setJoinStatus('');
        showCallUI();
        setCallStatus(t('waitingForPatient'));
        callStartTime = new Date();
        // 20s heartbeat — keeps WebSocket alive past server idle timeouts (~45s).
        clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => safeSend({ type: 'ping' }), 20000);
        if (currentPatientId) viewPatientReport(currentPatientId, currentPatientName);
      };
      signalingSocket.onmessage = async event => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'ping') { safeSend({ type: 'pong' }); return; }
        if (msg.type === 'pong') { return; }
        if (msg.type === 'offer') {
          setCallStatus(t('connectingCall'));
          await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          safeSend({ type: 'answer', room: currentRoom, sdp: answer.sdp });
        }
        if (msg.type === 'candidate') {
          try { await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.sdpMid, sdpMLineIndex: msg.sdpMLineIndex })); } catch(e) { console.warn('ICE candidate error:', e); }
        }
        if (msg.type === 'leave') { clearTimeout(disconnectDebounce); disconnectDebounce = null; showPeerLeft(); }
        if (msg.type === 'peer_joined') {
          setTimeout(() => {
            if (currentPatientId && (!fetchedObservations || fetchedObservations.length === 0)) {
              viewPatientReport(currentPatientId, currentPatientName);
            }
          }, 100);
        }
      };
      signalingSocket.onerror = () => setCallStatus(t('signalingError'));
      signalingSocket.onclose = () => {};
    } catch(e) {
      setJoinStatus('Error: ' + e.message);
      document.getElementById('joinBtn').disabled = false;
      console.error(e);
    }
  }

  function showPeerLeft() {
    document.getElementById('peerLeftOverlay').style.display = 'flex';
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = null; rv.style.display = 'none';
  }

  function endCall() {
    clearTimeout(disconnectDebounce); disconnectDebounce = null;
    clearInterval(heartbeatInterval); heartbeatInterval = null;
    safeSend({ type: 'leave', room: currentRoom });
    signalingSocket?.close(); pc?.close();
    localStream?.getTracks().forEach(tr => tr.stop());
    location.reload();
  }

  function toggleMute() {
    const track = localStream?.getAudioTracks()[0];
    if (!track) return;
    isMuted = !isMuted; track.enabled = !isMuted;
    document.querySelector('#muteBtn .ctrl-circle').textContent = isMuted ? '🔇' : '🎤';
    document.querySelector('#muteBtn .ctrl-circle').style.background = isMuted ? '#5BA4CF' : '#f3f3f3';
    document.getElementById('muteBtnLabel').textContent = isMuted ? t('unmute') : t('mute');
  }

  function toggleCamera() {
    const track = localStream?.getVideoTracks()[0];
    if (!track) return;
    isCameraOff = !isCameraOff; track.enabled = !isCameraOff;
    document.querySelector('#cameraBtn .ctrl-circle').textContent = isCameraOff ? '🚫' : '📷';
    document.querySelector('#cameraBtn .ctrl-circle').style.background = isCameraOff ? '#5BA4CF' : '#f3f3f3';
    document.getElementById('cameraBtnLabel').textContent = isCameraOff ? t('startVideo') : t('stopVideo');
  }

  function showCallUI() {
    isCallActive = true;
    document.getElementById('langToggle').classList.add('hidden');
    document.getElementById('joinScreen').style.display = 'none';
    document.getElementById('callScreen').style.display = 'block';
    updateBackBtn();
    updateChatStripeVisibility();
  }

  function safeSend(obj) {
    if (signalingSocket && signalingSocket.readyState === WebSocket.OPEN) signalingSocket.send(JSON.stringify(obj));
  }

  function setJoinStatus(msg) { document.getElementById('statusText').textContent = msg; }
  function setCallStatus(msg)  { document.getElementById('callStatus').textContent = msg; }

  // ── Init ──────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    applyStrings();

    setTimeout(() => { populateDoctorDropdown(); showTodayDate(); loadAppointments(); }, 50);

    document.getElementById('langRO').addEventListener('click', () => {
      if (currentLang === 'ro') return;
      localStorage.setItem('doctorUiLang', 'ro'); location.reload();
    });
    document.getElementById('langEN').addEventListener('click', () => {
      if (currentLang === 'en') return;
      localStorage.setItem('doctorUiLang', 'en'); location.reload();
    });

    document.getElementById('doctorSelect').addEventListener('change', loadAppointments);
    document.getElementById('joinBtn').addEventListener('click', joinCall);
    document.getElementById('endBtn').addEventListener('click', endCall);
    document.getElementById('muteBtn').addEventListener('click', toggleMute);
    document.getElementById('cameraBtn').addEventListener('click', toggleCamera);
    document.getElementById('panelBtn').addEventListener('click', () => {
      if (panelOpen && currentPanelState === 'report') { closePanel(); }
      else if (currentPatientId) { viewPatientReport(currentPatientId, currentPatientName); }
      else { openPanel(); }
    });
    document.getElementById('panelCloseBtn').addEventListener('click', () => { if (panelOpen) togglePanel(); });

    // Stripe button toggles the Patient Report panel.
    // If the report panel is already open → close it. Otherwise → open it.
    const stripeBtn = document.getElementById('chatStripeBtn');
    const toggleReport = () => {
      if (!currentPatientId) return;
      if (panelOpen && currentPanelState === 'report') {
        closePanel();
      } else {
        showPanelState('report');
      }
    };
    stripeBtn.addEventListener('click', toggleReport);
    stripeBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      toggleReport();
    }, { passive: false });

    document.getElementById('peerLeftEndBtn').addEventListener('click', endCall);
    document.getElementById('appointmentInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinCall(); });
  });
</script>
</body>
